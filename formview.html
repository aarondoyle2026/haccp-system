function openDB(){
return new Promise(function(res,rej){
var done=false;
var timer=setTimeout(function(){if(done)return;done=true;rej(new Error(‘Database timed out.’));},5000);
var req;try{req=indexedDB.open(DB_NAME,DB_VER);}catch(e){clearTimeout(timer);rej(e);return;}
req.onupgradeneeded=function(e){var d2=e.target.result;if(!d2.objectStoreNames.contains(‘records’)){var st=d2.createObjectStore(‘records’,{keyPath:‘id’});st.createIndex(‘formId’,‘formId’,{unique:false});st.createIndex(‘weekKey’,‘weekKey’,{unique:false});}if(!d2.objectStoreNames.contains(‘weeks’))d2.createObjectStore(‘weeks’,{keyPath:‘weekKey’});};
req.onsuccess=function(e){if(done)return;done=true;clearTimeout(timer);db=e.target.result;res(db);};
req.onerror=function(e){if(done)return;done=true;clearTimeout(timer);rej(e.target.error);};
req.onblocked=function(){if(done)return;done=true;clearTimeout(timer);rej(new Error(‘Database blocked. Close other tabs and refresh.’));};
});
}
function dbGet(id){
return new Promise(function(res,rej){
var tx=db.transaction(‘records’,‘readonly’);
var req=tx.objectStore(‘records’).get(id);
req.onsuccess=function(e){res(e.target.result);};
req.onerror=function(e){rej(e.target.error);};
});
}
function dbPut(store,obj){return new Promise(function(res,rej){var tx=db.transaction(store,‘readwrite’);tx.objectStore(store).put(obj);tx.oncomplete=res;tx.onerror=function(e){rej(e.target.error);};});}

/* –– Signature pads –– */
function initSig(canvasId){
var canvas=document.getElementById(canvasId);
if(!canvas||sigPads[canvasId])return;
canvas.width=canvas.parentElement.offsetWidth||300;
canvas.height=parseInt(canvas.getAttribute(‘height’))||80;
var ctx=canvas.getContext(‘2d’);ctx.strokeStyle=’#1a1a1a’;ctx.lineWidth=2;ctx.lineCap=‘round’;ctx.lineJoin=‘round’;
var drawing=false,lx=0,ly=0;
function gp(e){var r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
function start(e){e.preventDefault();drawing=true;var p=gp(e);lx=p.x;ly=p.y;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();}
function move(e){if(!drawing)return;e.preventDefault();var p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;}
function stop(){drawing=false;}
canvas.addEventListener(‘mousedown’,start);canvas.addEventListener(‘mousemove’,move);canvas.addEventListener(‘mouseup’,stop);canvas.addEventListener(‘mouseleave’,stop);
canvas.addEventListener(‘touchstart’,start,{passive:false});canvas.addEventListener(‘touchmove’,move,{passive:false});canvas.addEventListener(‘touchend’,stop);
sigPads[canvasId]={clear:function(){ctx.clearRect(0,0,canvas.width,canvas.height);}};
}

/* –– Save evidence back to record –– */
function saveEvidence(){
if(!currentRec)return;
var newPhotos=formPhotos.slice();
var existing=currentRec.photos||[];
var allPhotos=existing.concat(newPhotos);
var newSigs=[];
var sigIds=[‘sig-main’,‘sig-mgr’];
for(var si=0;si<sigIds.length;si++){
var cv=document.getElementById(sigIds[si]);
if(!cv)continue;
var hasSig=false,sigData=null;
try{var ctx=cv.getContext(‘2d’),imgd=ctx.getImageData(0,0,cv.width,cv.height);for(var px=3;px<imgd.data.length;px+=4){if(imgd.data[px]>0){hasSig=true;break;}}if(hasSig)sigData=cv.toDataURL(‘image/png’);}catch(e2){}
if(hasSig)newSigs.push({id:sigIds[si],dataUrl:sigData,hasSignature:true});
}
var existingSigs=currentRec.signatures||[];
var allSigs=existingSigs.concat(newSigs);
var updated={};
for(var k in currentRec)updated[k]=currentRec[k];
updated.photos=allPhotos;
updated.signatures=allSigs;
if(formTimestamp)updated.timestamp=formTimestamp;
dbPut(‘records’,updated).then(function(){showToast(’\u2705 Evidence saved to record!’);currentRec=updated;formPhotos=[];}).catch(function(){showToast(‘Save failed’);});
}

window.addEventListener(‘pagehide’,function(){try{if(db){db.close();db=null;}}catch(e){}});
document.getElementById(‘lbClose’).addEventListener(‘click’,closeLightbox);
document.getElementById(‘lightbox’).addEventListener(‘click’,function(e){if(e.target===this)closeLightbox();});
var params=window.location.search;
var idStr=’’;
if(params){var m=params.match(/[?&]id=([^&]+)/);if(m)idStr=m[1];}
if(!idStr){document.getElementById(‘statusBar’).textContent=‘No record ID specified’;document.getElementById(‘statusBar’).className=‘status-bar err’;return;}
var recId=parseInt(idStr,10);
var sb=document.getElementById(‘statusBar’);
function boot(){
sb.textContent=‘Loading record…’;sb.className=‘status-bar’;
openDB().then(function(){return dbGet(recId);}).then(function(rec){
if(!rec){sb.textContent=‘Record not found’;sb.className=‘status-bar err’;return;}
renderPage(rec);
}).catch(function(e){
sb.textContent=(e.message||‘Error’)+’ \u2014 Tap to retry’;sb.className=‘status-bar err’;sb.style.cursor=‘pointer’;
sb.addEventListener(‘click’,function handler(){sb.removeEventListener(‘click’,handler);boot();});
});
}
boot();
});
</script>

</body>
</html>
