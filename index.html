var DB_NAME = 'MoriartyHACCP', DB_VER = 1, db = null;
var currentFormId = null;

function openDB() {
  return new Promise(function(res, rej) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('records')) {
        var s = d.createObjectStore('records', {keyPath:'id', autoIncrement:true});
        s.createIndex('formId','formId',{unique:false});
        s.createIndex('weekKey','weekKey',{unique:false});
      }
    };
    req.onsuccess = function(e) { db = e.target.result; res(db); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbGetAll(store) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function(e) { res(e.target.result); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbPut(store, obj) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(obj);
    tx.oncomplete = res;
    tx.onerror = function(e) { rej(e.target.error); };
  });
}

function getWeekKey() {
  var d = new Date();
  var s = new Date(d);
  s.setDate(d.getDate() - d.getDay());
  s.setHours(0,0,0,0);
  return s.toISOString().split('T')[0];
}

function scrapeFormData(formId) {
  var scr = document.getElementById(formId);
  if (!scr) return [];
  var entries = [];
  var elements = scr.querySelectorAll('input, select, textarea');
  for (var i = 0; i < elements.length; i++) {
    var el = elements[i];
    if (el.type === 'file' || el.classList.contains('fsc-input') || el.classList.contains('we-input')) continue;
    
    var label = '';
    var td = el.closest('td');
    if (td) {
      var tr = td.closest('tr');
      var th = tr.querySelector('th') || tr.querySelector('td.unit-name') || tr.querySelector('td.product-name') || tr.querySelector('td.area-name') || tr.querySelector('td.prod-name') || tr.querySelector('td:first-child');
      if (th) label = th.textContent.trim();
      var cellIdx = td.cellIndex;
      var table = td.closest('table');
      var head = table.querySelector('thead tr') || table.querySelector('tr:first-child');
      if (head && head.cells[cellIdx]) label += ' (' + head.cells[cellIdx].textContent.trim() + ')';
    }
    if (!label) label = el.placeholder || el.name || 'Entry ' + (i+1);
    
    var val = (el.type === 'checkbox') ? el.checked : el.value;
    entries.push({ label: label, value: val, type: el.type });
  }
  return entries;
}

function populateFormData(formId, entries) {
  var scr = document.getElementById(formId);
  if (!scr || !entries) return;
  var elements = scr.querySelectorAll('input, select, textarea');
  var entryIdx = 0;
  for (var i = 0; i < elements.length; i++) {
    var el = elements[i];
    if (el.type === 'file' || el.classList.contains('fsc-input') || el.classList.contains('we-input')) continue;
    if (entryIdx < entries.length) {
      var entry = entries[entryIdx++];
      if (el.type === 'checkbox') el.checked = entry.value;
      else if (el.type === 'radio') { if (el.value == entry.value) el.checked = true; else entryIdx--; }
      else el.value = entry.value;
    }
  }
}

  document.getElementById('home').style.display = 'none';
  if (currentFormId) document.getElementById(currentFormId).style.display = 'none';
  var scr = document.getElementById(id);
  if (!scr) return;
  scr.style.display = 'block';
  currentFormId = id;
  document.getElementById('backBtn').style.display = 'block';
  var h2 = scr.querySelector('h2');
  document.getElementById('navTitle').textContent = h2 ? h2.textContent : id;
  window.scrollTo(0,0);
  
  var urlParams = new URLSearchParams(window.location.search);
  var viewId = urlParams.get('viewRec');
  
  if (viewId) {
    dbGetAll('records').then(function(recs) {
      var rec = recs.find(r => r.id == viewId);
      if (rec && rec.formData) populateFormData(id, rec.formData);
    });
  } else {
    var wk = getWeekKey();
    dbGetAll('records').then(function(recs) {
      var latest = null;
      for (var i = 0; i < recs.length; i++) {
        if (recs[i].formId === id && recs[i].weekKey === wk) {
          if (!latest || recs[i].savedAt > latest.savedAt) latest = recs[i];
        }
      }
      if (latest && latest.formData) populateFormData(id, latest.formData);
    });
  }
  
  setTimeout(function() {
    var canvases = scr.querySelectorAll('canvas');
    for (var ci = 0; ci < canvases.length; ci++) { initSig(canvases[ci].id); }
  }, 100);
}

function goBack() {
  if (window.location.search.includes('viewRec')) { window.location.href = 'records.html'; return; }
  if (currentFormId) document.getElementById(currentFormId).style.display = 'none';
  document.getElementById('home').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('navTitle').textContent = 'HACCP System';
  currentFormId = null;
  window.scrollTo(0,0);
}

function saveForm(formId) {
  var scr = document.getElementById(formId);
  var champion = scr.querySelector('.fsc-input') ? scr.querySelector('.fsc-input').value : '';
  var weekEnding = scr.querySelector('.we-input') ? scr.querySelector('.we-input').value : '';
  
  var signatures = [];
  var canvases = scr.querySelectorAll('canvas');
  canvases.forEach(function(c) {
    signatures.push({ id: c.id, dataUrl: c.toDataURL(), hasSignature: true });
  });

  var record = {
    formId: formId,
    weekKey: getWeekKey(),
    savedAt: Date.now(),
    champion: champion,
    weekEnding: weekEnding,
    timestamp: new Date().toLocaleString('en-IE'),
    formData: scrapeFormData(formId),
    signatures: signatures,
    photos: []
  };

  dbPut('records', record).then(function() {
    showToast('\u2705 Record Saved');
    setTimeout(goBack, 800);
  });
}

function initSig(id) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var drawing = false;
  canvas.width = canvas.offsetWidth;
  canvas.height = 140;
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
  
  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  }
  canvas.addEventListener('mousedown', function(e) { drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', function(e) { if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  window.addEventListener('mouseup', function() { drawing = false; });
  canvas.addEventListener('touchstart', function(e) { drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); });
  canvas.addEventListener('touchmove', function(e) { if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
  canvas.addEventListener('touchend', function() { drawing = false; });
}

function showToast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

/* TABLE GENERATORS */
function buildTempTable(units) {
  var html = '<div class="week-table-wrap"><table class="week-table temp-table"><thead><tr><th class="unit-col">Refrigerated Unit</th><th class="temp-col">Target</th>';
  for (var d = 0; d < 7; d++) html += '<th colspan="2">' + DAYS[d] + '</th>';
  html += '</tr><tr><th></th><th></th>';
  for (var d2 = 0; d2 < 7; d2++) html += '<th style="font-size:9px">AM</th><th style="font-size:9px">PM</th>';
  html += '</tr></thead><tbody>';
  units.forEach(u => {
    html += '<tr><td class="unit-name">' + u[0] + '</td><td class="target">' + u[1] + '</td>';
    for (var j = 0; j < 14; j++) html += '<td><input type="text" maxlength="4"></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function buildCleanTable(type) {
  var items = type === 'rm' ? cleaningItemsDaily : (type === 'sr' ? [[['Yard','Degreaser/Mop'],['Back-up cold room','Degreaser/Sanitiser']]] : []);
  var html = '<div class="week-table-wrap"><table class="week-table clean-table"><thead><tr><th class="area-col">Area</th><th class="chem-col">Chemical</th>';
  for (var d = 0; d < 7; d++) html += '<th>' + DAYS[d].substring(0,3) + '</th>';
  html += '</tr></thead><tbody>';
  if (type === 'rm') {
    html += '<tr><td colspan="9" class="clean-section-header">DAILY CLEANING</td></tr>';
    cleaningItemsDaily.forEach(i => html += '<tr><td class="area-name">' + i[0] + '</td><td class="chem-name">' + i[1] + '</td>' + '<td><input type="checkbox"></td>'.repeat(7) + '</tr>');
    html += '<tr><td colspan="9" class="clean-section-header">WEEKLY CLEANING</td></tr>';
    cleaningItemsWeekly.forEach(i => html += '<tr><td class="area-name">' + i[0] + '</td><td class="chem-name">' + i[1] + '</td>' + '<td><input type="checkbox"></td>'.repeat(7) + '</tr>');
  }
  html += '</tbody></table></div>';
  return html;
}

function boot() {
  var menu = document.getElementById('menuContainer');
  var cats = {};
  ALL_FORMS.forEach(f => { if (!cats[f.cat]) cats[f.cat] = []; cats[f.cat].push(f); });
  
  for (var c in cats) {
    var sec = document.createElement('div'); sec.className = 'category-section';
    sec.innerHTML = '<div class="category-label">' + c + '</div>';
    var grid = document.createElement('div'); grid.className = 'form-grid';
    cats[c].forEach(f => {
      var card = document.createElement('div'); card.className = 'form-card';
      card.onclick = () => showForm(f.id);
      card.innerHTML = '<div class="form-icon" style="background:#e8f5ee;color:#00703c;">\ud83d\udcc4</div><div class="form-info"><div class="form-name">' + f.name + '</div><div class="form-desc">Moriarty Group HACCP</div></div><div class="form-arrow">&#8250;</div>';
      grid.appendChild(card);
      
      var screen = document.createElement('div'); screen.id = f.id; screen.className = 'form-screen';
      var content = f.units ? buildTempTable(f.units) : (f.type ? buildCleanTable(f.type) : '<p>Table placeholder</p>');
      
      screen.innerHTML = 
        '<div class="form-header"><h2>' + f.name + '</h2><p>Moriarty Group Food Safety Management</p></div>' +
        '<div class="form-body">' +
          '<div class="field-row"><div class="field-group"><label class="field-label">Week Ending</label><input type="date" class="field-input we-input"></div>' +
          '<div class="field-group"><label class="field-label">Champion</label><input type="text" class="field-input fsc-input" placeholder="Name"></div></div>' +
          content +
          '<div class="section-title">Corrective Action</div><textarea class="field-input" rows="3" placeholder="Record any corrective actions taken..."></textarea>' +
          '<div class="section-title">Signatures</div>' +
          '<div class="sig-box"><canvas id="sig-' + f.id + '"></canvas><div class="sig-clear" onclick="document.getElementById(\'sig-' + f.id + '\').getContext(\'2d\').clearRect(0,0,1000,1000)">Clear</div></div>' +
          '<button class="btn-save" onclick="saveForm(\'' + f.id + '\')">Save to Records</button>' +
        '</div>';
      document.getElementById('formContainer').appendChild(screen);
    });
    sec.appendChild(grid); menu.appendChild(sec);
  }
  openDB().then(() => { document.getElementById('statusBar').textContent = '\u25cf System Online'; });
}
boot();
</script>
