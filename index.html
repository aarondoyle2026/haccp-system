.gs-table{border-collapse:collapse;width:100%;font-size:12px;min-width:600px;}

.gs-table td.day-name{text-align:left;padding:5px 8px;font-size:11px;background:#fafafa;font-weight:600;}
.gs-table td.week-header{background:#005a30!important;color:white!important;font-weight:700;font-size:11px;text-align:left;padding:5px 8px;}
.gs-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;}

.cook-table td.prod-name{text-align:left;padding:5px 8px;font-size:11px;background:#fafafa;}

.deli-trace-table th{background:#00703c;color:white;padding:6px 4px;text-align:center;font-size:10px;font-weight:600;border:1px solid #005a30;white-space:nowrap;}

.max-row td{background:#f5f5f5;font-weight:600;font-size:11px;}
.sig-box{border:2px dashed #d0d0d0;border-radius:8px;background:white;position:relative;overflow:hidden;}
.sig-box canvas{display:block;width:100%;touch-action:none;}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #d0d0d0;background:#f0f0f0;}

.photo-thumb .photo-delete{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(211,47,47,0.85);border:none;border-radius:50%;color:white;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:#e8f5ee;border:2px dashed #00703c;border-radius:8px;color:#005a30;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lightbox-info{color:white;font-size:12px;margin-top:10px;opacity:0.8;text-align:center;}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;}

<script>
// ALL YOUR ORIGINAL JAVASCRIPT VARIABLES AND FUNCTIONS REMAIN THE SAME
// ONLY THE saveForm FUNCTION HAS BEEN REPLACED WITH THE FIXED VERSION BELOW

var sandwiches = [ /* ... all your original arrays ... */ ];
// ... (all the other var declarations you had) ...

function saveForm(formId) {
  var we = document.getElementById('we-' + formId);
  var fsc = document.getElementById('fsc-' + formId);
  var now = new Date();
  var photos = formPhotos[formId] || [];
  var photoData = [];
  for (var pi = 0; pi < photos.length; pi++) {
    photoData.push({dataUrl: photos[pi].dataUrl, name: photos[pi].name, timestamp: photos[pi].timestamp});
  }

  // === FULL SHEET CAPTURE (this is the fix) ===
  var fullSheetHTML = '';
  var formScreen = document.getElementById(formId);
  if (formScreen) {
    var clone = formScreen.cloneNode(true);

    // Turn every signature canvas into a permanent image
    var canvases = clone.querySelectorAll('canvas');
    canvases.forEach(function(canvas) {
      if (canvas.width > 0 && canvas.height > 0) {
        var dataUrl = canvas.toDataURL('image/png');
        var img = document.createElement('img');
        img.src = dataUrl;
        img.style.cssText = 'width:100%;height:auto;border:2px dashed #d0d0d0;border-radius:8px;background:white;';
        canvas.parentNode.replaceChild(img, canvas);
      }
    });

    // Remove all buttons and interactive elements so the record looks clean
    clone.querySelectorAll('.btn-save, .sig-clear, .photo-delete, input[type="file"], .ts-btn').forEach(function(el) {
      el.remove();
    });

    fullSheetHTML = clone.outerHTML;
  }
  // === END OF FULL SHEET CAPTURE ===

  var record = {
    id: now.getTime(),
    formId: formId,
    weekKey: getWeekKey(),
    savedAt: now.toISOString(),
    weekEnding: we ? we.value : '',
    champion: fsc ? fsc.value : '',
    timestamp: formTimestamps[formId] || now.toLocaleString('en-IE', {timeZone:'Europe/Dublin', hour12:false}),
    photos: photoData,
    photoCount: photoData.length,
    fullSheetHTML: fullSheetHTML   // ← This saves the entire populated form
  };

  var doSave = function() {
    dbPut('records', record).then(function() {
      showToast('✅ Saved to Records – full sheet preserved!');
      updateBannerCount();
    }).catch(function(e) { showToast('Save failed: ' + e.message); });
  };

  if (!db) { openDB().then(function() { doSave(); }); } else { doSave(); }
}

// The rest of your original script (initSig, recordTimestamp, handlePhotos, makeTempRows, etc.) stays exactly the same
// ... (everything after saveForm in your original file)
</script>
