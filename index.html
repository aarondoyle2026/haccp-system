<!DOCTYPE html>

<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>HACCP Test</title>
<style>
body{font-family:sans-serif;background:#f4f6f4;margin:0;}
.nav{background:#00703c;color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;}
.back{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:14px;display:none;}
#home{display:block;padding:20px;}
.card{background:white;border:1px solid #ddd;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;}
.form-screen{display:none;padding:20px;}
.btn{background:#005a30;color:white;border:none;border-radius:8px;padding:14px;width:100%;font-size:15px;margin-top:12px;cursor:pointer;}
</style>
</head>
<body>
<div class="nav">
  <button class="back" id="backBtn" onclick="goBack()">Back</button>
  <span id="navTitle">HACCP Test</span>
</div>
<div id="home">
  <div class="card" onclick="showForm('form1')">Tap me - Meat Temperature</div>
  <div class="card" onclick="showForm('form2')">Tap me - Dairy Temperature</div>
</div>
<div id="form1" class="form-screen">
  <h2>Meat Temperature</h2>
  <input type="text" placeholder="Week ending" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-top:10px;">
  <button class="btn" onclick="saveIt('form1')">Save to Records</button>
</div>
<div id="form2" class="form-screen">
  <h2>Dairy Temperature</h2>
  <input type="text" placeholder="Week ending" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-top:10px;">
  <button class="btn" onclick="saveIt('form2')">Save to Records</button>
</div>
<script>
var currentForm = null;
function showForm(id) {
  document.getElementById('home').style.display = 'none';
  if (currentForm) document.getElementById(currentForm).style.display = 'none';
  document.getElementById(id).style.display = 'block';
  currentForm = id;
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('navTitle').textContent = id;
}
function goBack() {
  if (currentForm) document.getElementById(currentForm).style.display = 'none';
  document.getElementById('home').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('navTitle').textContent = 'HACCP Test';
  currentForm = null;
}
function saveIt(id) {
  alert('Saved: ' + id);
}
</script>
</body>
</html>
