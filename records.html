<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f4f6f4;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}

.week-banner{background:#00703c;color:white;border-radius:10px;padding:12px 14px;margin:12px 16px;display:flex;justify-content:space-between;align-items:center;}

.topsheet-card{background:white;border:1px solid #d0d0d0;border-radius:10px;margin:0 16px 10px;overflow:hidden;}
.topsheet-card-header{background:#005a30;color:white;padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
.topsheet-row{padding:10px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;cursor:pointer;}
.topsheet-row:last-child{border-bottom:none;}

.ts-status{font-size:16px;flex-shrink:0;}
.ts-row-name{font-size:12px;font-weight:600;flex:1;}

.ts-row-miss{font-size:10px;color:#e65100;font-weight:600;}
.data-tools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.dt-btn{background:white;border:1.5px solid #d0d0d0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;}
.dt-btn:active{border-color:#00703c;background:#e8f5ee;}
.dt-icon{font-size:22px;margin-bottom:4px;}
.dt-label{font-size:12px;font-weight:700;color:#1a1a1a;}
.dt-sub{font-size:10px;color:#666;margin-top:2px;}
.close-week-btn{background:#e65100;color:white;border:none;border-radius:8px;padding:10px 16px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:calc(100% - 32px);margin:0 16px 8px;display:block;}
.db-status{font-size:11px;color:#666;text-align:center;padding:6px 16px;font-family:'Courier New',monospace;}
.db-status.ok{color:#2e7d32;}
.db-status.err{color:#c62828;}
.pw-list{padding:16px;}
.pw-item{background:white;border:1px solid #d0d0d0;border-top:none;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.pw-item:first-child{border-top:1px solid #d0d0d0;border-radius:8px 8px 0 0;}
.pw-item:last-child{border-radius:0 0 8px 8px;}
.pw-item:only-child{border-radius:8px;}
.pw-item:active{background:#e8f5ee;}
.pw-label{font-size:13px;font-weight:600;color:#1a1a1a;}
.pw-meta{font-size:11px;color:#666;font-family:'Courier New',monospace;margin-top:2px;}
.pw-pct{font-size:15px;font-weight:700;}

.modal-overlay.open{display:flex;}

.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#666;}

.m-btn{padding:10px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:center;}
.m-btn-danger{background:white;color:#d32f2f;border:1.5px solid #d32f2f;}
.m-btn-dark{background:#1a1a1a;color:white;}
.m-btn-sec{background:white;color:#00703c;border:1.5px solid #00703c;}
.ts-badge{background:#f4f6f4;border:1px solid #d0d0d0;border-radius:6px;padding:8px 12px;font-family:'Courier New',monospace;font-size:11px;color:#666;margin-bottom:12px;}
.detail-field{margin-bottom:10px;}
.detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#666;}
.detail-value{font-size:14px;margin-top:2px;}
.divider{height:1px;background:#d0d0d0;margin:12px 0;}
</style>

<div class="modal-overlay" id="recordModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="modal-title">Record</div><button class="modal-close" onclick="closeModal()">&#10005;</button></div><div id="modal-body"></div><div class="modal-actions"><button class="m-btn m-btn-danger" onclick="deleteRecord()">&#128465;</button><button class="m-btn m-btn-dark" onclick="exportRecordPDF()">&#128247; PDF</button><button class="m-btn m-btn-sec" onclick="closeModal()">Close</button></div></div></div>
<div class="modal-overlay" id="weekModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="wm-title">Week Summary</div><button class="modal-close" onclick="closeWeekModal()">&#10005;</button></div><div id="wm-body"></div><div class="modal-actions"><button class="m-btn m-btn-danger" onclick="deletePastWeek()">&#128465;</button><button class="m-btn m-btn-dark" onclick="emailWeekPDF()">&#9993;&#65039; Email PDF</button><button class="m-btn m-btn-sec" onclick="closeWeekModal()">Close</button></div></div></div>
<script>
var ALL_FORMS=[{id:'temp-meat',name:'Meat Dept Temperature',cat:'Temperature Checks'},{id:'temp-prepack',name:'Pre-pack Temperature',cat:'Temperature Checks'},{id:'temp-dairy',name:'Dairy Temperature',cat:'Temperature Checks'},{id:'temp-frozen',name:'Frozen Temperature',cat:'Temperature Checks'},{id:'temp-fruitveg',name:'Fruit & Veg Temperature',cat:'Temperature Checks'},{id:'temp-deli',name:'Deli Temperature',cat:'Temperature Checks'},{id:'hotfood-chicken-temp',name:'Chicken Unit Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-bar-temp',name:'Hot Food Bar Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-soup-temp',name:'Soup Kettle Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-after-cook',name:'After Cook Check Sheet',cat:'Hot Food & Deli'},{id:'hotfood-greaseshield',name:'GreaseShield Maintenance',cat:'Hot Food & Deli'},{id:'hotfood-daily-clean',name:'Hot Food Daily Cleaning',cat:'Hot Food & Deli'},{id:'hotfood-weekly-clean',name:'Hot Food Weekly Cleaning',cat:'Hot Food & Deli'},{id:'cookedmeat-clean',name:'Cooked Meats Daily Cleaning',cat:'Hot Food & Deli'},{id:'cookedmeat-weekly-clean',name:'Cooked Meats Weekly Cleaning',cat:'Hot Food & Deli'},{id:'thawing-check',name:'Thawing Check Sheet',cat:'Hot Food & Deli'},{id:'deli-trace-stuffing',name:'Sandwich Log - Stuffing & Wraps',cat:'Deli Traceability'},{id:'deli-trace-butter',name:'Sandwich Log - Butter/Ham/Turkey',cat:'Deli Traceability'},{id:'deli-trace-chicken',name:'Sandwich Log - Chicken Tikka',cat:'Deli Traceability'},{id:'deli-trace-saladveg',name:'Sandwich Log - Salad Veg',cat:'Deli Traceability'},{id:'deli-trace-eggtuna',name:'Sandwich Log - Egg & Tuna',cat:'Deli Traceability'},{id:'trace-sandwich',name:'Pre-Pack Sandwich Tracker',cat:'Traceability Logs'},{id:'trace-wrap',name:'Pre-Pack Wrap Tracker',cat:'Traceability Logs'},{id:'trace-pizza',name:'Pre-Pack Pizza Tracker',cat:'Traceability Logs'},{id:'trace-salad-made',name:'Salads Made in Store',cat:'Traceability Logs'},{id:'trace-salad-prepack',name:'Pre-Pack Salads',cat:'Traceability Logs'},{id:'trace-savouries',name:'Savouries Traceability',cat:'Traceability Logs'},{id:'trace-cooked-meats',name:'Cooked Meat Traceability',cat:'Traceability Logs'},{id:'trace-salami',name:'Salami / Olives Traceability',cat:'Traceability Logs'},{id:'trace-cheese',name:'Cheese Traceability',cat:'Traceability Logs'},{id:'trace-fish',name:'Fish Tracker',cat:'Traceability Logs'},{id:'trace-pork',name:'Pork & Bacon Traceability',cat:'Traceability Logs'},{id:'trace-butcher',name:'Prep by Butcher/Fishmonger',cat:'Traceability Logs'},{id:'prod-mince',name:'Mince Control Sheet',cat:'Production Logs'},{id:'prod-burger',name:'Burger Control Sheet',cat:'Production Logs'},{id:'clean-redmeat',name:'Red Meat Cleaning',cat:'Cleaning Schedules'},{id:'clean-fruitveg',name:'Fruit & Veg Cleaning',cat:'Cleaning Schedules'},{id:'clean-stockroom',name:'Stockroom Cleaning',cat:'Cleaning Schedules'},{id:'goods-chilled',name:'Goods Inwards Chilled/Frozen',cat:'Goods Inwards'},{id:'goods-ambient',name:'Goods Inwards Ambient',cat:'Goods Inwards'},{id:'compliance',name:'HACCP Compliance Report',cat:'Compliance'}];

var DB_NAME=‘MoriartyHACCP’,DB_VER=1,db=null;
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(‘records’)){var s=d.createObjectStore(‘records’,{keyPath:‘id’});s.createIndex(‘formId’,‘formId’,{unique:false});s.createIndex(‘weekKey’,‘weekKey’,{unique:false});}if(!d.objectStoreNames.contains(‘weeks’))d.createObjectStore(‘weeks’,{keyPath:‘weekKey’});};r.onsuccess=function(e){db=e.target.result;res(db);};r.onerror=function(e){rej(e.target.error);}});}
function dbPut(store,obj){return new Promise(function(res,rej){var tx=db.transaction(store,‘readwrite’);tx.objectStore(store).put(obj);tx.oncomplete=res;tx.onerror=function(e){rej(e.target.error);}});}
function dbGetAll(store){return new Promise(function(res,rej){var tx=db.transaction(store,‘readonly’);var r=tx.objectStore(store).getAll();r.onsuccess=function(e){res(e.target.result);};r.onerror=function(e){rej(e.target.error);}});}
function dbDelete(store,key){return new Promise(function(res,rej){var tx=db.transaction(store,‘readwrite’);tx.objectStore(store).delete(key);tx.oncomplete=res;tx.onerror=function(e){rej(e.target.error);}});}

function getWeekKey(){var d=new Date();var day=d.getDay();var s=new Date(d);s.setDate(d.getDate()-day);s.setHours(0,0,0,0);return s.toISOString().split(‘T’)[0];}
function getWeekLabel(wk){var s=new Date(wk+‘T00:00:00’);var e=new Date(s);e.setDate(e.getDate()+6);var f=function(d){return d.toLocaleDateString(‘en-IE’,{day:‘numeric’,month:‘short’});};return f(s)+’ – ‘+f(e)+’ ’+e.getFullYear();}
function getSatMidnight(wk){var s=new Date(wk+‘T00:00:00’);var e=new Date(s);e.setDate(e.getDate()+6);e.setHours(23,59,59,0);return e;}

var allRecords=[],activeRecordId=null,activePastWeekId=null;

function switchTab(tab){
var tabs=document.querySelectorAll(’.tab’);for(var ti=0;ti<tabs.length;ti++)tabs[ti].classList.remove(‘active’);
var pages=document.querySelectorAll(’.page’);for(var pi=0;pi<pages.length;pi++)pages[pi].classList.remove(‘active’);
document.getElementById(‘tab-’+tab).classList.add(‘active’);
document.getElementById(‘page-’+tab).classList.add(‘active’);
if(tab===‘pastweeks’)renderPastWeeks();
}
function showToast(msg,dur){var t=document.getElementById(‘toast’);t.textContent=msg;t.classList.add(‘show’);setTimeout(function(){t.classList.remove(‘show’);},dur||3000);}

function buildTopSheetHTML(recs){
var wk=getWeekKey();
allRecords=recs;
var el=document.getElementById(‘db-status-el’);
el.textContent=‘● Storage active · ‘+recs.length+’ record’+(recs.length!==1?‘s’:’’)+’ saved’;
el.className=‘db-status ok’;
var closes=getSatMidnight(wk);var diff=closes-new Date();
var timer=diff>0?(Math.floor(diff/86400000)>0?Math.floor(diff/86400000)+‘d ‘:’’)+Math.floor((diff%86400000)/3600000)+‘h ‘+Math.floor((diff%3600000)/60000)+‘m remaining’:‘Week closing…’;
document.getElementById(‘week-banner-wrap’).innerHTML=’<div class="week-banner"><div><div class="wb-label">CURRENT WEEK</div><div class="wb-week">’+getWeekLabel(wk)+’</div><div class="wb-timer">’+timer+’</div></div><div style="text-align:right;font-size:10px;opacity:0.8;">Closes Saturday midnight</div></div>’;
var wkRecs=recs.filter(function(r){return r.weekKey===wk;});
var subIds={};wkRecs.forEach(function(r){subIds[r.formId]=r;});
var done=Object.keys(subIds).length,tot=ALL_FORMS.length,pct=Math.round(done/tot*100);
document.getElementById(‘comp-fill’).style.width=pct+’%’;
document.getElementById(‘comp-text’).textContent=done+’ of ‘+tot+’ forms completed this week (’+pct+’%)’;
var cats={};ALL_FORMS.forEach(function(f){if(!cats[f.cat])cats[f.cat]=[];cats[f.cat].push(f);});
var html=’’;
Object.keys(cats).forEach(function(cat){
html+=’<div class="topsheet-card"><div class="topsheet-card-header">’+cat+’</div>’;
cats[cat].forEach(function(f){
var rec=subIds[f.id];
var status=rec?‘✅’:‘⚠️’;
var meta=rec?new Date(rec.savedAt).toLocaleString(‘en-IE’,{day:‘2-digit’,month:‘short’,hour:‘2-digit’,minute:‘2-digit’,hour12:false})+(rec.champion?’ · ‘+rec.champion:’’):’’;
html+=’<div class="topsheet-row" onclick="'+(rec?'openRecord('+rec.id+')':'window.location.href='index.html'')+'"><div class="ts-status">’+status+’</div><div class="ts-row-name">’+f.name+’</div>’+(rec?’<div class="ts-row-time">’+meta+’</div>’:’<div class="ts-row-miss">Not submitted</div>’)+’</div>’;
});
html+=’</div>’;
});
document.getElementById(‘topsheet-content’).innerHTML=html;
}

function renderTopSheet(){
dbGetAll(‘records’).then(function(recs){
buildTopSheetHTML(recs);
checkWeekClose();
}).catch(function(e){
document.getElementById(‘db-status-el’).textContent=’Storage error: ’+e.message;
document.getElementById(‘db-status-el’).className=‘db-status err’;
});
}

function openRecord(id){
var r=allRecords.find(function(x){return x.id===id;});if(!r)return;
activeRecordId=id;
var fm=ALL_FORMS.find(function(f){return f.id===r.formId;});
document.getElementById(‘modal-title’).textContent=fm?fm.name:r.formId;
var html=’<div class="ts-badge">Saved: ‘+new Date(r.savedAt).toLocaleString(‘en-IE’)+’</div>’;
if(r.weekEnding)html+=’<div class="detail-field"><div class="detail-label">Week Ending</div><div class="detail-value">’+r.weekEnding+’</div></div>’;
if(r.champion)html+=’<div class="detail-field"><div class="detail-label">Food Safety Champion</div><div class="detail-value">’+r.champion+’</div></div>’;
if(r.photoCount>0){html+=’<div class="divider"></div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:8px;">Photos (’+r.photoCount+’)</div><div style="display:flex;flex-wrap:wrap;gap:8px;">’;r.photos.forEach(function(p){html+=’<img src="'+p.dataUrl+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #d0d0d0;">’;});html+=’</div>’;}
document.getElementById(‘modal-body’).innerHTML=html;
document.getElementById(‘recordModal’).classList.add(‘open’);
}
function closeModal(){document.getElementById(‘recordModal’).classList.remove(‘open’);activeRecordId=null;}
function deleteRecord(){
if(!confirm(‘Delete this record?’))return;
dbDelete(‘records’,activeRecordId).then(function(){
return dbGetAll(‘records’);
}).then(function(recs){
closeModal();buildTopSheetHTML(recs);
});
}
function exportRecordPDF(){
var r=allRecords.find(function(x){return x.id===activeRecordId;});if(!r)return;
var fm=ALL_FORMS.find(function(f){return f.id===r.formId;});
var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF({orientation:‘portrait’,unit:‘mm’,format:‘a4’});
var G=[0,112,60],D=[26,31,24],M=[102,102,102];
doc.setFillColor(G[0],G[1],G[2]);doc.rect(0,0,210,28,‘F’);doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont(‘helvetica’,‘bold’);doc.text(‘MORIARTY GROUP’,14,12);doc.setFontSize(8);doc.setFont(‘helvetica’,‘normal’);doc.text(‘SuperValu HACCP System’,14,19);doc.setFontSize(11);doc.setFont(‘helvetica’,‘bold’);doc.text((fm?fm.name:r.formId).toUpperCase(),196,12,{align:‘right’});doc.setFontSize(7);doc.setFont(‘helvetica’,‘normal’);doc.text(getWeekLabel(r.weekKey),196,19,{align:‘right’});
var y=34;doc.setFontSize(8);doc.setTextColor(M[0],M[1],M[2]);doc.text(‘Saved: ‘+new Date(r.savedAt).toLocaleString(‘en-IE’),14,y);y+=8;
if(r.weekEnding){doc.setFontSize(7);doc.setFont(‘helvetica’,‘bold’);doc.text(‘WEEK ENDING’,14,y);doc.setFontSize(10);doc.setTextColor(D[0],D[1],D[2]);doc.setFont(‘helvetica’,‘normal’);doc.text(r.weekEnding,14,y+4);y+=12;}
if(r.champion){doc.setFontSize(7);doc.setTextColor(M[0],M[1],M[2]);doc.setFont(‘helvetica’,‘bold’);doc.text(‘FOOD SAFETY CHAMPION’,14,y);doc.setFontSize(10);doc.setTextColor(D[0],D[1],D[2]);doc.setFont(‘helvetica’,‘normal’);doc.text(r.champion,14,y+4);y+=12;}
if(r.photoCount>0){y+=4;doc.setFillColor(232,245,238);doc.rect(14,y,182,6,‘F’);doc.setFontSize(7);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(G[0],G[1],G[2]);doc.text(‘PHOTOS (’+r.photoCount+’)’,16,y+4);y+=10;r.photos.forEach(function(p,i){try{doc.addImage(p.dataUrl,‘JPEG’,14+(i%3)*63,y,60,45);}catch(e){}if((i+1)%3===0)y+=48;});}
doc.setFillColor(G[0],G[1],G[2]);doc.rect(0,287,210,10,‘F’);doc.setFontSize(7);doc.setTextColor(255,255,255);doc.setFont(‘helvetica’,‘normal’);doc.text(‘Moriarty Group SuperValu Generated: ‘+new Date().toLocaleString(‘en-IE’),105,293,{align:‘center’});
doc.save(r.formId+’_’+r.weekKey+’.pdf’);
}

function checkWeekClose(){
var now=new Date();var wk=getWeekKey();
if(now>=getSatMidnight(wk)){
dbGetAll(‘weeks’).then(function(weeks){
var found=weeks.filter(function(w){return w.weekKey===wk;}).length>0;
if(!found)doCloseWeek(wk);
});
}
}
function closeWeekManually(){
if(!confirm(‘Close the current week now and archive it?’))return;
var wk=getWeekKey();
dbGetAll(‘weeks’).then(function(weeks){
var found=weeks.filter(function(w){return w.weekKey===wk;}).length>0;
if(found){showToast(‘This week is already closed.’);return;}
doCloseWeek(wk,function(){renderTopSheet();});
});
}
function doCloseWeek(wk,cb){
var recs=allRecords.filter(function(r){return r.weekKey===wk;});
var ids={};recs.forEach(function(r){ids[r.formId]=r;});
var done=Object.keys(ids).length;
var week={weekKey:wk,label:getWeekLabel(wk),closedAt:new Date().toISOString(),completed:done,total:ALL_FORMS.length,pct:Math.round(done/ALL_FORMS.length*100),records:recs};
dbPut(‘weeks’,week).then(function(){
showToast(‘✅ Week ‘+week.label+’ archived.’);
if(cb)cb();
});
}

function renderPastWeeks(){
dbGetAll(‘weeks’).then(function(weeks){
var list=document.getElementById(‘past-weeks-list’);
if(!weeks.length){list.innerHTML=’<div class="empty-state"><div class="es-icon">📅</div><p>No completed weeks yet.<br>Weeks close Saturday at midnight.</p></div>’;return;}
var sorted=weeks.slice().sort(function(a,b){return b.weekKey.localeCompare(a.weekKey);});
list.innerHTML=sorted.map(function(w){var col=w.pct>=80?’#00703c’:w.pct>=70?’#e65100’:’#d32f2f’;return’<div class="pw-item" onclick="openPastWeek(''+w.weekKey+'')"><div><div class="pw-label">’+w.label+’</div><div class="pw-meta">Closed: ‘+new Date(w.closedAt).toLocaleDateString(‘en-IE’)+’  ‘+w.completed+’/’+w.total+’ forms</div></div><div class="pw-pct" style="color:'+col+'">’+w.pct+’%</div></div>’;}).join(’’);
});
}
function openPastWeek(weekKey){
dbGetAll(‘weeks’).then(function(weeks){
var w=weeks.filter(function(x){return x.weekKey===weekKey;})[0];if(!w)return;
activePastWeekId=weekKey;document.getElementById(‘wm-title’).textContent=w.label;
var ids={};(w.records||[]).forEach(function(r){ids[r.formId]=r;});
var cats={};ALL_FORMS.forEach(function(f){if(!cats[f.cat])cats[f.cat]=[];cats[f.cat].push(f);});
var pCol=w.pct>=80?’#00703c’:w.pct>=70?’#e65100’:’#d32f2f’;
var html=’<div class="ts-badge">Closed: ‘+new Date(w.closedAt).toLocaleString(‘en-IE’)+’</div>’;
html+=’<div style="background:'+pCol+';color:white;border-radius:8px;padding:12px;text-align:center;margin-bottom:14px;"><div style="font-size:10px;font-weight:700;opacity:0.8;letter-spacing:0.1em;">COMPLETION</div><div style="font-size:26px;font-weight:700;">’+w.pct+’%</div><div style="font-size:12px;opacity:0.85;">’+w.completed+’ of ‘+w.total+’ forms</div></div>’;
Object.keys(cats).forEach(function(cat){
html+=’<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin:10px 0 5px;">’+cat+’</div>’;
cats[cat].forEach(function(f){var rec=ids[f.id];var s=rec?‘✅’:‘❌’;var meta=rec?new Date(rec.savedAt).toLocaleString(‘en-IE’,{day:‘2-digit’,month:‘short’,hour:‘2-digit’,minute:‘2-digit’,hour12:false}):‘Not completed’;html+=’<div style="background:#f4f6f4;border-radius:6px;padding:7px 10px;margin-bottom:3px;display:flex;align-items:center;gap:8px;"><span>’+s+’</span><span style="flex:1;font-size:12px;font-weight:600;">’+f.name+’</span><span style="font-size:10px;color:#666;font-family:monospace;">’+meta+’</span></div>’;});
});
document.getElementById(‘wm-body’).innerHTML=html;document.getElementById(‘weekModal’).classList.add(‘open’);
});
}
function closeWeekModal(){document.getElementById(‘weekModal’).classList.remove(‘open’);activePastWeekId=null;}
function deletePastWeek(){
if(!confirm(‘Delete this weekly archive?’))return;
dbDelete(‘weeks’,activePastWeekId).then(function(){closeWeekModal();renderPastWeeks();});
}

function exportBackup(){
dbGetAll(‘records’).then(function(recs){
dbGetAll(‘weeks’).then(function(weeks){
if(!recs.length&&!weeks.length){showToast(‘No data to export yet.’);return;}
var blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),records:recs,weeks:weeks},null,2)],{type:‘application/json’});
var url=URL.createObjectURL(blob);var a=document.createElement(‘a’);a.href=url;a.download=‘haccp-backup-’+new Date().toISOString().split(‘T’)[0]+’.json’;a.click();URL.revokeObjectURL(url);
});
});
}
function importBackup(input){
var file=input.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(e){
try{
var data=JSON.parse(e.target.result);
if(!confirm(‘Merge ‘+(data.records||[]).length+’ records and ‘+(data.weeks||[]).length+’ weeks?’))return;
var recs=data.records||[];var wks=data.weeks||[];var i=0;
function putNext(){
if(i<recs.length){dbPut(‘records’,recs[i++]).then(putNext);}
else{var j=0;function putWeek(){if(j<wks.length){dbPut(‘weeks’,wks[j++]).then(putWeek);}else{dbGetAll(‘records’).then(function(r){allRecords=r;showToast(‘✅ Import complete.’);renderTopSheet();});}}putWeek();}
}
putNext();
}catch(err){showToast(‘❌ Import failed: ‘+err.message);}
};
reader.readAsText(file);input.value=’’;
}
setInterval(function(){
var wk=getWeekKey();var closes=getSatMidnight(wk);var diff=closes-new Date();
if(diff>0){var d=Math.floor(diff/86400000);var h=Math.floor((diff%86400000)/3600000);var m=Math.floor((diff%3600000)/60000);var timer=(d>0?d+‘d ‘:’’)+h+‘h ‘+m+‘m remaining’;var el=document.querySelector(’.wb-timer’);if(el)el.textContent=timer;}
},60000);
document.addEventListener(‘DOMContentLoaded’,function(){
openDB().then(function(){renderTopSheet();}).catch(function(e){
var el=document.getElementById(‘db-status-el’);
el.textContent=’Storage error: ’+e.message;el.className=‘db-status err’;
});
});
