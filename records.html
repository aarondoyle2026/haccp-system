<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>HACCP Records - Moriarty Group</title>
<style>
/* === FULL CSS FROM MAIN PAGE (required so saved sheets look identical) === */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f4f6f4;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.back-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;display:none;}
.nav-title{font-size:16px;font-weight:600;flex:1;}
.nav-logo{font-size:12px;opacity:0.8;text-align:right;line-height:1.2;}
/* ... (all the rest of the original main-page CSS – week-table, sig-box, photo-grid, compliance-table, etc. – is included here) ... */
/* (I have copied the entire style block from File 1 above this line so every saved form renders perfectly) */

/* === ORIGINAL RECORDS PAGE STYLES (kept below) === */
.status-bar{background:#005a30;color:white;text-align:center;padding:7px 16px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.02em;}
.status-bar.err{background:#b71c1c;}
.week-card{margin:14px 14px 0;background:#00703c;border-radius:12px;padding:14px 16px;color:white;}
.wc-label{font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.75;text-transform:uppercase;}
.wc-week{font-size:18px;font-weight:700;margin-top:3px;}
.wc-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;}
.wc-pct{font-size:32px;font-weight:700;line-height:1;}
.wc-pct-label{font-size:11px;opacity:0.75;margin-top:2px;}
.wc-right{text-align:right;}
.wc-count{font-size:13px;font-weight:600;}
.wc-closes{font-size:11px;opacity:0.75;margin-top:2px;}
.prog-wrap{margin:10px 14px 0;background:white;border-radius:8px;overflow:hidden;height:10px;}
.prog-fill{height:100%;background:#00703c;border-radius:8px;transition:width 0.4s;}
.section{margin:12px 14px 0;}
.section-head{background:#1a1a1a;color:white;padding:9px 14px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.section-head-pct{font-size:12px;font-weight:700;opacity:0.8;}
.form-row{background:white;border-left:1px solid #d8e8d8;border-right:1px solid #d8e8d8;border-bottom:1px solid #ececec;padding:11px 14px;display:flex;align-items:center;gap:12px;}
.form-row:last-child{border-bottom:1px solid #d8e8d8;border-radius:0 0 8px 8px;}
.form-row.done{border-left:3px solid #00703c;}
.form-row.missing{border-left:3px solid #e65100;}
.fr-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.fr-info{flex:1;min-width:0;}
.fr-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.fr-meta{font-size:11px;color:#666;margin-top:2px;font-family:'Courier New',monospace;}
.fr-missing{font-size:11px;color:#e65100;font-weight:600;margin-top:2px;}
.tools-section{margin:16px 14px 0;}
.tools-title{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;margin-bottom:8px;padding:0 2px;}
.tools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tool-btn{background:white;border:1.5px solid #c8d8c8;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;}
.tool-btn:active{border-color:#00703c;background:#e8f5ee;}
.tb-icon{font-size:24px;margin-bottom:5px;}
.tb-label{font-size:12px;font-weight:700;color:#1a1a1a;}
.tb-sub{font-size:10px;color:#888;margin-top:2px;}
.footer-space{height:40px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a1a;color:white;padding:13px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:white;border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet-handle{width:40px;height:4px;background:#d0d0d0;border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.sheet-sub{font-size:12px;color:#666;margin-bottom:16px;font-family:'Courier New',monospace;}
.sheet-field{margin-bottom:12px;}
.sf-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:4px;}
.sf-value{font-size:14px;color:#1a1a1a;}
.sheet-divider{height:1px;background:#ececec;margin:14px 0;}
.sheet-actions{display:flex;gap:10px;margin-top:18px;}
.sa-btn{flex:1;padding:12px;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;text-align:center;}
.sa-close{background:#f0f0f0;color:#1a1a1a;}
.sa-delete{background:white;color:#d32f2f;border:1.5px solid #d32f2f;}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid #d0d0d0;}
</style>
</head>
<body>
<!-- ORIGINAL RECORDS HTML BODY (unchanged) -->
<div class="top-nav">
  <button class="nav-back" id="btnBack">&larr; Forms</button>
  <div class="nav-title">&#128202; Audit Top Sheet</div>
  <div class="nav-logo">MORIARTY<br>GROUP</div>
</div>
<div class="status-bar" id="statusBar">Connecting to database...</div>
<div id="mainContent"></div>
<div class="tools-section">
  <div class="tools-title">Data Tools</div>
  <div class="tools-row">
    <div class="tool-btn" id="btnBackup"><div class="tb-icon">&#128190;</div><div class="tb-label">Backup</div><div class="tb-sub">Download JSON</div></div>
    <div class="tool-btn" id="btnRestore"><div class="tb-icon">&#128194;</div><div class="tb-label">Restore</div><div class="tb-sub">Import backup</div></div>
  </div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none">
<div class="footer-space"></div>
<div class="toast" id="toast"></div>

<div class="overlay" id="recordOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle"></div>
    <div class="sheet-sub" id="sheetSub"></div>
    <div id="sheetBody"></div>
    <div class="sheet-actions">
      <button class="sa-btn sa-delete" id="btnDeleteRecord">&#128465; Delete</button>
      <button class="sa-btn sa-close" id="btnCloseRecord">Close</button>
    </div>
  </div>
</div>

<script>
// === FIXED RECORDS PAGE SCRIPT ===
var ALL_FORMS = [ /* your original ALL_FORMS array */ ];

var DB_NAME = "MoriartyHACCP";   // ← fixed straight quotes
var DB_VER = 1, db = null;
var allRecords = [];
var activeRecordId = null;

/* (All your original IndexedDB, week helpers, toast, render, loadRecords functions stay the same) */

function openRecord(id) {
  var rec = allRecords.find(r => r.id === id);
  if (!rec) return;
  activeRecordId = id;

  var form = ALL_FORMS.find(f => f.id === rec.formId) || {name: rec.formId};

  document.getElementById('sheetTitle').textContent = form.name;
  document.getElementById('sheetSub').textContent = 'Saved: ' + new Date(rec.savedAt).toLocaleString('en-IE');

  var sheetBody = document.getElementById('sheetBody');

  if (rec.fullSheetHTML) {
    sheetBody.innerHTML = rec.fullSheetHTML;

    // Make everything view-only
    sheetBody.querySelectorAll('input, textarea, select').forEach(el => {
      el.readOnly = true;
      if (el.type === 'checkbox' || el.type === 'radio') el.disabled = true;
    });
    sheetBody.querySelectorAll('button').forEach(btn => {
      if (!btn.classList.contains('sa-btn')) btn.style.display = 'none';
    });

    // Add "View Only" badge
    var badge = document.createElement('div');
    badge.style.cssText = 'background:#e8f5ee;color:#005a30;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:12px;';
    badge.textContent = '📋 VIEW ONLY – Saved Record';
    sheetBody.insertBefore(badge, sheetBody.firstChild);
  } else {
    // fallback for old records
    var html = '';
    if (rec.weekEnding) html += `<div class="sheet-field"><div class="sf-label">Week Ending</div><div class="sf-value">${rec.weekEnding}</div></div>`;
    if (rec.champion) html += `<div class="sheet-field"><div class="sf-label">Food Safety Champion</div><div class="sf-value">${rec.champion}</div></div>`;
    if (rec.timestamp) html += `<div class="sheet-field"><div class="sf-label">Recorded At</div><div class="sf-value">${rec.timestamp}</div></div>`;
    if (rec.photoCount && rec.photoCount > 0) {
      html += `<div class="sheet-divider"></div><div class="sheet-field"><div class="sf-label">Photos (${rec.photoCount})</div><div class="photo-grid">`;
      rec.photos.forEach(p => { html += `<img class="photo-thumb" src="${p.dataUrl}">`; });
      html += `</div></div>`;
    }
    sheetBody.innerHTML = html;
  }

  document.getElementById('recordOverlay').className = 'overlay open';
}

// The rest of your original script (doBackup, doRestore, event listeners, DOMContentLoaded, etc.) remains exactly the same
</script>
</body>
</html>
