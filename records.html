<!DOCTYPE html><html lang="en">

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>HACCP Records - Moriarty Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.nav-back{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}
.nav-title{font-size:17px;font-weight:700;flex:1;}
.nav-logo{font-size:11px;opacity:0.75;text-align:right;line-height:1.3;font-weight:600;}
.status-bar{background:#005a30;color:white;text-align:center;padding:7px 16px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.02em;}
.status-bar.err{background:#b71c1c;}
/* Week card */
.week-card{margin:14px 14px 0;background:#00703c;border-radius:12px;padding:14px 16px;color:white;}
.wc-label{font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.75;text-transform:uppercase;}
.wc-week{font-size:18px;font-weight:700;margin-top:3px;}
.wc-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;}
.wc-pct{font-size:32px;font-weight:700;line-height:1;}
.wc-pct-label{font-size:11px;opacity:0.75;margin-top:2px;}
.wc-right{text-align:right;}
.wc-count{font-size:13px;font-weight:600;}
.wc-closes{font-size:11px;opacity:0.75;margin-top:2px;}
.prog-wrap{margin:10px 14px 0;background:white;border-radius:8px;overflow:hidden;height:10px;}
.prog-fill{height:100%;background:#00703c;border-radius:8px;transition:width 0.4s;}
/* Category sections */
.section{margin:12px 14px 0;}
.section-head{background:#1a1a1a;color:white;padding:9px 14px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.section-head-pct{font-size:12px;font-weight:700;opacity:0.8;}
/* Form rows */
.form-row{background:white;border-left:1px solid #d8e8d8;border-right:1px solid #d8e8d8;border-bottom:1px solid #ececec;padding:12px 14px;}
.form-row:last-child{border-bottom:1px solid #d8e8d8;border-radius:0 0 8px 8px;}
.form-row.done{border-left:4px solid #00703c;}
.form-row-top{display:flex;align-items:center;gap:10px;cursor:pointer;}
.fr-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.fr-info{flex:1;min-width:0;}
.fr-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.fr-meta{font-size:11px;color:#666;margin-top:2px;font-family:'Courier New',monospace;}
.fr-chevron{font-size:18px;color:#aaa;transition:transform 0.2s;flex-shrink:0;line-height:1;}
.fr-chevron.open{transform:rotate(90deg);}
/* Expanded detail */
.rec-detail{display:none;margin-top:12px;border-top:2px solid #e8f5ee;padding-top:12px;}
.rec-detail.open{display:block;}
/* Detail metadata grid */
.rec-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.rmc{background:#f8faf8;border-radius:8px;padding:9px 11px;}
.rmc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:4px;}
.rmc-value{font-size:12px;color:#1a1a1a;line-height:1.4;}
/* Data Snapshot with Labels */
.data-snapshot{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:14px;}
.ds-label{font-size:10px;font-weight:700;color:#00703c;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid #e0eee0;padding-bottom:6px;}
.ds-list{display:grid;grid-template-columns:1fr;gap:6px;}
.ds-entry{display:flex;justify-content:space-between;font-size:11px;border-bottom:1px dashed #eee;padding-bottom:4px;}
.ds-entry:last-child{border-bottom:none;}
.ds-key{color:#666;font-weight:500;max-width:70%;}
.ds-val{font-weight:700;color:#1a1a1a;}
/* Signatures */
.rec-sigs{margin-bottom:10px;}
.rec-sigs-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:6px;}
.rec-sigs-row{display:flex;flex-wrap:wrap;gap:8px;}
.rec-sig-item{text-align:center;}
.rec-sig-img{display:block;width:90px;height:45px;object-fit:contain;background:white;border:1px solid #ddd;border-radius:6px;}
.rec-sig-name{font-size:9px;color:#999;margin-top:3px;}
/* Action buttons */
.view-btn{width:100%;background:#00703c;color:white;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;text-decoration:none;display:block;text-align:center;}
.rec-delete-btn{width:100%;padding:9px;background:white;border:1.5px solid #d32f2f;color:#d32f2f;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a1a;color:white;padding:13px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="top-nav">
  <button class="nav-back" onclick="window.location.href='index.html'">&#8592; Forms</button>
  <div class="nav-title">Audit Top Sheet</div>
  <div class="nav-logo">MORIARTY<br>GROUP</div>
</div>

<div class="status-bar" id="statusBar">Connecting to database...</div>
<div id="mainContent"></div>

<div class="toast" id="toast"></div>

<script>
var ALL_FORMS = [
  {id:'temp-meat',name:'Meat Dept Temperature',cat:'Temperature Checks'},
  {id:'temp-prepack',name:'Pre-pack Temperature',cat:'Temperature Checks'},
  {id:'temp-dairy',name:'Dairy Temperature',cat:'Temperature Checks'},
  {id:'temp-frozen',name:'Frozen Temperature',cat:'Temperature Checks'},
  {id:'temp-fruitveg',name:'Fruit & Veg Temperature',cat:'Temperature Checks'},
  {id:'temp-deli',name:'Deli Temperature Checklist',cat:'Temperature Checks'},
  {id:'hotfood-daily-clean',name:'Hot Food Daily Cleaning',cat:'Hot Food & Deli'},
  {id:'hotfood-weekly-clean',name:'Hot Food Weekly Cleaning',cat:'Hot Food & Deli'},
  {id:'clean-redmeat',name:'Red Meat Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-fruitveg',name:'Fruit & Veg Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-stockroom',name:'Stockroom Cleaning',cat:'Cleaning Schedules'},
  {id:'compliance',name:'HACCP Compliance Report',cat:'Compliance'}
];

var DB_NAME = 'MoriartyHACCP', DB_VER = 1, db = null;

function openDB() {
  return new Promise(function(res, rej) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onsuccess = function(e) { db = e.target.result; res(db); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbGetAll(store) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function(e) { res(e.target.result); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbDelete(store, key) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res;
  });
}

function getWeekKey() {
  var d = new Date();
  var s = new Date(d);
  s.setDate(d.getDate() - d.getDay());
  s.setHours(0,0,0,0);
  return s.toISOString().split('T')[0];
}

function weekLabel(wk) {
  var s = new Date(wk + 'T00:00:00');
  var e = new Date(s); e.setDate(s.getDate() + 6);
  return s.toLocaleDateString('en-IE', {day:'numeric', month:'short'}) + ' \u2013 ' + e.toLocaleDateString('en-IE', {day:'numeric', month:'short', year:'numeric'});
}

function buildRecordDetail(rec) {
  var html = '';
  html += '<div class="rec-meta-grid">';
  html += '<div class="rmc"><div class="rmc-label">Food Safety Champion</div><div class="rmc-value">' + (rec.champion || 'Not recorded') + '</div></div>';
  html += '<div class="rmc"><div class="rmc-label">Recorded At</div><div class="rmc-value">' + rec.timestamp + '</div></div>';
  html += '</div>';

  if (rec.formData && rec.formData.length) {
    html += '<div class="data-snapshot"><div class="ds-label">Form Entry Details</div><div class="ds-list">';
    rec.formData.forEach(function(entry) {
      if (entry.value === "" || entry.value === false) return;
      var val = entry.value === true ? '\u2705' : entry.value;
      html += '<div class="ds-entry"><span class="ds-key">' + entry.label + '</span><span class="ds-val">' + val + '</span></div>';
    });
    html += '</div></div>';
  }

  if (rec.signatures && rec.signatures.length) {
    html += '<div class="rec-sigs"><div class="rec-sigs-label">Captured Signatures</div><div class="rec-sigs-row">';
    rec.signatures.forEach(function(sig) {
      if (sig.dataUrl) html += '<div class="rec-sig-item"><img class="rec-sig-img" src="' + sig.dataUrl + '"><div class="rec-sig-name">Signature</div></div>';
    });
    html += '</div></div>';
  }

  html += '<a href="index.html?viewRec=' + rec.id + '&formId=' + rec.formId + '" class="view-btn">View Full Sheet</a>';
  html += '<button class="rec-delete-btn" onclick="deleteRec(' + rec.id + ')">\ud83d\uddd1 Delete Record</button>';
  return html;
}

function deleteRec(id) {
  if (confirm('Delete this record?')) {
    dbDelete('records', id).then(function() { location.reload(); });
  }
}

function render(recs) {
  var wk = getWeekKey();
  var byForm = {};
  recs.forEach(r => { if (r.weekKey === wk) { if (!byForm[r.formId] || r.savedAt > byForm[r.formId].savedAt) byForm[r.formId] = r; } });
  
  var done = Object.keys(byForm).length;
  var total = ALL_FORMS.length;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;

  var mc = document.getElementById('mainContent');
  mc.innerHTML = 
    '<div class="week-card"><div class="wc-label">Current Week</div><div class="wc-week">' + weekLabel(wk) + '</div>' +
    '<div class="wc-row"><div><div class="wc-pct">' + pct + '%</div><div class="wc-pct-label">Compliance</div></div>' +
    '<div class="wc-right"><div class="wc-count">' + done + ' / ' + total + ' forms</div><div class="wc-closes">Closes Saturday</div></div></div></div>' +
    '<div class="prog-wrap"><div class="prog-fill" style="width:' + pct + '%"></div></div>';

  var cats = {};
  ALL_FORMS.forEach(f => { if (!cats[f.cat]) cats[f.cat] = []; cats[f.cat].push(f); });
  
  for (var c in cats) {
    var sec = document.createElement('div'); sec.className = 'section';
    var cDone = cats[c].filter(f => byForm[f.id]).length;
    sec.innerHTML = '<div class="section-head"><span>' + c + '</span><span class="section-head-pct">' + cDone + '/' + cats[c].length + '</span></div>';
    
    cats[c].forEach(f => {
      var rec = byForm[f.id];
      var row = document.createElement('div');
      row.className = 'form-row' + (rec ? ' done' : '');
      row.innerHTML = 
        '<div class="form-row-top" onclick="toggleDetail(' + (rec ? rec.id : 0) + ')">' +
          '<div class="fr-icon">' + (rec ? '\u2705' : '\u26a0\ufe0f') + '</div>' +
          '<div class="fr-info"><div class="fr-name">' + f.name + '</div><div class="fr-meta">' + (rec ? rec.timestamp : 'Pending') + '</div></div>' +
          (rec ? '<div class="fr-chevron" id="chev-' + rec.id + '">\u203a</div>' : '') +
        '</div>' +
        (rec ? '<div class="rec-detail" id="det-' + rec.id + '">' + buildRecordDetail(rec) + '</div>' : '');
      sec.appendChild(row);
    });
    mc.appendChild(sec);
  }
}

function toggleDetail(id) {
  if (!id) return;
  var d = document.getElementById('det-' + id);
  var c = document.getElementById('chev-' + id);
  var open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  c.style.transform = open ? 'rotate(0deg)' : 'rotate(90deg)';
}

openDB().then(() => {
  dbGetAll('records').then(render);
  document.getElementById('statusBar').textContent = '\u25cf Audit Online';
});
</script>
</body>
</html>
