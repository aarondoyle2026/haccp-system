<!DOCTYPE html><html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>HACCP Records - Moriarty Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.nav-back{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}
.nav-title{font-size:17px;font-weight:700;flex:1;}
.nav-logo{font-size:11px;opacity:0.75;text-align:right;line-height:1.3;font-weight:600;}
.status-bar{background:#005a30;color:white;text-align:center;padding:7px 16px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.02em;}
.status-bar.err{background:#b71c1c;}
.main-content{padding:14px;}
.section{margin-bottom:14px;}
.section-head{background:#1a1a1a;color:white;padding:10px 16px;border-radius:10px 10px 0 0;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;display:flex;justify-content:space-between;}
.form-row{background:white;border-bottom:1px solid #eee;padding:14px 16px;border-left:1px solid #d8e8d8;border-right:1px solid #d8e8d8;}
.form-row:last-child{border-bottom:1px solid #d8e8d8;border-radius:0 0 10px 10px;}
.form-row.done{border-left:4px solid #00703c;}
.fr-top{display:flex;align-items:center;gap:12px;cursor:pointer;}
.fr-icon{font-size:18px;color:#00703c;}
.fr-info{flex:1;}
.fr-name{font-size:14px;font-weight:600;}
.fr-meta{font-size:11px;color:#666;margin-top:2px;}
.fr-chevron{font-size:18px;color:#ccc;transition:transform 0.2s;}
.fr-chevron.open{transform:rotate(90deg);}
.rec-detail{display:none;padding-top:14px;margin-top:14px;border-top:1px solid #eee;}
.rec-detail.open{display:block;}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.rg-item{background:#f8faf8;padding:10px;border-radius:8px;}
.rg-label{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:4px;}
.rg-value{font-size:12px;font-weight:600;}
.data-snapshot{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:14px;}
.ds-label{font-size:10px;font-weight:700;color:#00703c;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid #e0eee0;padding-bottom:6px;}
.ds-list{display:grid;grid-template-columns:1fr;gap:6px;}
.ds-entry{display:flex;justify-content:space-between;font-size:12px;border-bottom:1px dashed #eee;padding-bottom:4px;}
.ds-entry:last-child{border-bottom:none;}
.ds-key{color:#666;font-weight:500;max-width:70%;}
.ds-val{font-weight:700;color:#1a1a1a;}
.sig-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.sig-item{text-align:center;background:white;border:1px solid #ddd;border-radius:8px;padding:6px;}
.sig-img{height:50px;display:block;margin:0 auto;}
.sig-label{font-size:9px;color:#999;margin-top:4px;}
.view-btn{width:100%;background:#00703c;color:white;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;text-decoration:none;display:block;text-align:center;}
.del-btn{width:100%;background:white;color:#d32f2f;border:1.5px solid #d32f2f;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div class="top-nav">
  <button class="nav-back" onclick="location.href='index.html'">&#8592; Forms</button>
  <div class="nav-title">Audit Top Sheet</div>
  <div class="nav-logo">MORIARTY<br>GROUP</div>
</div>

<div class="status-bar" id="statusBar">Loading records...</div>

<div id="mainContent" class="main-content"></div>

<script>
var ALL_FORMS = [
  {id:'temp-meat',name:'Meat Dept Temperature',cat:'Temperature Checks'},
  {id:'temp-prepack',name:'Pre-pack Temperature',cat:'Temperature Checks'},
  {id:'temp-dairy',name:'Dairy Temperature',cat:'Temperature Checks'},
  {id:'temp-frozen',name:'Frozen Temperature',cat:'Temperature Checks'},
  {id:'temp-fruitveg',name:'Fruit & Veg Temperature',cat:'Temperature Checks'},
  {id:'temp-deli',name:'Deli Temperature',cat:'Temperature Checks'},
  {id:'hotfood-chicken-temp',name:'Chicken Unit Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-bar-temp',name:'Hot Food Bar Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-soup-temp',name:'Soup Kettle Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-after-cook',name:'After Cook Check Sheet',cat:'Hot Food & Deli'},
  {id:'hotfood-greaseshield',name:'GreaseShield Maintenance',cat:'Hot Food & Deli'},
  {id:'hotfood-daily-clean',name:'Hot Food Daily Cleaning',cat:'Hot Food & Deli'},
  {id:'hotfood-weekly-clean',name:'Hot Food Weekly Cleaning',cat:'Hot Food & Deli'},
  {id:'cookedmeat-clean',name:'Cooked Meats Daily Cleaning',cat:'Hot Food & Deli'},
  {id:'cookedmeat-weekly-clean',name:'Cooked Meats Weekly Cleaning',cat:'Hot Food & Deli'},
  {id:'thawing-check',name:'Thawing Check Sheet',cat:'Hot Food & Deli'},
  {id:'deli-trace-stuffing',name:'Sandwich Log - Stuffing & Wraps',cat:'Deli Traceability'},
  {id:'deli-trace-butter',name:'Sandwich Log - Butter/Ham/Turkey',cat:'Deli Traceability'},
  {id:'deli-trace-chicken',name:'Sandwich Log - Chicken Tikka',cat:'Deli Traceability'},
  {id:'deli-trace-saladveg',name:'Sandwich Log - Salad Veg',cat:'Deli Traceability'},
  {id:'deli-trace-eggtuna',name:'Sandwich Log - Egg & Tuna',cat:'Deli Traceability'},
  {id:'trace-sandwich',name:'Pre-Pack Sandwich Tracker',cat:'Traceability Logs'},
  {id:'trace-wrap',name:'Pre-Pack Wrap Tracker',cat:'Traceability Logs'},
  {id:'trace-pizza',name:'Pre-Pack Pizza Tracker',cat:'Traceability Logs'},
  {id:'trace-salad-made',name:'Salads Made in Store',cat:'Traceability Logs'},
  {id:'trace-salad-prepack',name:'Pre-Pack Salads',cat:'Traceability Logs'},
  {id:'trace-savouries',name:'Savouries Traceability',cat:'Traceability Logs'},
  {id:'trace-cooked-meats',name:'Cooked Meat Traceability',cat:'Traceability Logs'},
  {id:'trace-salami',name:'Salami / Olives Traceability',cat:'Traceability Logs'},
  {id:'trace-cheese',name:'Cheese Traceability',cat:'Traceability Logs'},
  {id:'trace-fish',name:'Fish Tracker',cat:'Traceability Logs'},
  {id:'trace-pork',name:'Pork & Bacon Traceability',cat:'Traceability Logs'},
  {id:'trace-butcher',name:'Prep by Butcher/Fishmonger',cat:'Traceability Logs'},
  {id:'prod-mince',name:'Mince Control Sheet',cat:'Production Logs'},
  {id:'prod-burger',name:'Burger Control Sheet',cat:'Production Logs'},
  {id:'clean-redmeat',name:'Red Meat Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-fruitveg',name:'Fruit & Veg Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-stockroom',name:'Stockroom Cleaning',cat:'Cleaning Schedules'},
  {id:'goods-chilled',name:'Goods Inwards Chilled/Frozen',cat:'Goods Inwards'},
  {id:'goods-ambient',name:'Goods Inwards Ambient',cat:'Goods Inwards'},
  {id:'compliance',name:'HACCP Compliance Report',cat:'Compliance'}
];

var DB_NAME = 'MoriartyHACCP', DB_VER = 1, db = null;

function openDB() {
  return new Promise(function(res, rej) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onsuccess = function(e) { db = e.target.result; res(db); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbGetAll(store) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function(e) { res(e.target.result); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbDelete(store, id) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = res;
  });
}

function buildRecordDetail(rec) {
  var html = '<div class="rec-detail" id="detail-' + rec.id + '">';
  
  // Metadata Grid
  html += '<div class="rec-grid">';
  html += '<div class="rg-item"><div class="rg-label">Food Safety Champion</div><div class="rg-value">' + (rec.champion || 'Not set') + '</div></div>';
  html += '<div class="rg-item"><div class="rg-label">Recorded At</div><div class="rg-value">' + rec.timestamp + '</div></div>';
  html += '</div>';
  
  // Data Snapshot with Labels
  if (rec.formData && rec.formData.length) {
    html += '<div class="data-snapshot"><div class="ds-label">Recorded Entries</div><div class="ds-list">';
    rec.formData.forEach(function(entry) {
      if (entry.value === "" || entry.value === false) return;
      var valDisplay = entry.value === true ? '✅' : entry.value;
      html += '<div class="ds-entry"><span class="ds-key">' + (entry.label || 'Field') + '</span><span class="ds-val">' + valDisplay + '</span></div>';
    });
    html += '</div></div>';
  }
  
  // Signatures
  if (rec.signatures && rec.signatures.length) {
    html += '<div class="sig-row">';
    rec.signatures.forEach(function(sig) {
      if (!sig.dataUrl) return;
      html += '<div class="sig-item"><img class="sig-img" src="' + sig.dataUrl + '"><div class="sig-label">Signature</div></div>';
    });
    html += '</div>';
  }
  
  // Links & Actions
  html += '<a href="index.html?viewRec=' + rec.id + '" class="view-btn">View Full Sheet</a>';
  html += '<button class="del-btn" onclick="deleteRecord(' + rec.id + ')">Delete Record</button>';
  
  html += '</div>';
  return html;
}

function deleteRecord(id) {
  if (confirm('Are you sure you want to delete this record?')) {
    dbDelete('records', id).then(function() {
      location.reload();
    });
  }
}

function toggleDetail(id) {
  var el = document.getElementById('detail-' + id);
  var chev = document.getElementById('chev-' + id);
  var isOpen = el.style.display === 'block';
  el.style.display = isOpen ? 'none' : 'block';
  chev.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
}

function render() {
  dbGetAll('records').then(function(recs) {
    var menu = document.getElementById('mainContent');
    var cats = {};
    ALL_FORMS.forEach(function(f) {
      if (!cats[f.cat]) cats[f.cat] = [];
      cats[f.cat].push(f);
    });
    
    document.getElementById('statusBar').textContent = '\u25cf Audit Online \u00b7 ' + recs.length + ' Total Records';

    for (var cat in cats) {
      var section = document.createElement('div');
      section.className = 'section';
      var recsInCat = recs.filter(r => cats[cat].some(f => f.id === r.formId));
      section.innerHTML = '<div class="section-head"><span>' + cat + '</span><span>' + recsInCat.length + ' RECS</span></div>';
      
      cats[cat].forEach(function(f) {
        var formRecs = recs.filter(r => r.formId === f.id).sort((a,b) => b.savedAt - a.savedAt);
        formRecs.forEach(function(rec) {
          var row = document.createElement('div');
          row.className = 'form-row done';
          row.innerHTML = 
            '<div class="fr-top" onclick="toggleDetail(' + rec.id + ')">' +
              '<div class="fr-icon">\u2705</div>' +
              '<div class="fr-info"><div class="fr-name">' + f.name + '</div><div class="fr-meta">' + rec.timestamp + '</div></div>' +
              '<div class="fr-chevron" id="chev-' + rec.id + '">\u203a</div>' +
            '</div>' +
            buildRecordDetail(rec);
          section.appendChild(row);
        });
      });
      menu.appendChild(section);
    }
  });
}

openDB().then(render);
</script>
</body>
</html>
