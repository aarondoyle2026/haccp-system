<!DOCTYPE html><html lang="en">

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>HACCP Records - Moriarty Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.nav-back{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}
.nav-title{font-size:17px;font-weight:700;flex:1;}
.nav-logo{font-size:11px;opacity:0.75;text-align:right;line-height:1.3;font-weight:600;}
.status-bar{background:#005a30;color:white;text-align:center;padding:7px 16px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.02em;}
.status-bar.err{background:#b71c1c;}
/* Week card */
.week-card{margin:14px 14px 0;background:#00703c;border-radius:12px;padding:14px 16px;color:white;}
.wc-label{font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.75;text-transform:uppercase;}
.wc-week{font-size:18px;font-weight:700;margin-top:3px;}
.wc-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;}
.wc-pct{font-size:32px;font-weight:700;line-height:1;}
.wc-pct-label{font-size:11px;opacity:0.75;margin-top:2px;}
.wc-right{text-align:right;}
.wc-count{font-size:13px;font-weight:600;}
.wc-closes{font-size:11px;opacity:0.75;margin-top:2px;}
.prog-wrap{margin:10px 14px 0;background:white;border-radius:8px;overflow:hidden;height:10px;}
.prog-fill{height:100%;background:#00703c;border-radius:8px;transition:width 0.4s;}
/* Category sections */
.section{margin:12px 14px 0;}
.section-head{background:#1a1a1a;color:white;padding:9px 14px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.section-head-pct{font-size:12px;font-weight:700;opacity:0.8;}
/* Form rows */
.form-row{background:white;border-left:1px solid #d8e8d8;border-right:1px solid #d8e8d8;border-bottom:1px solid #ececec;padding:12px 14px;}
.form-row:last-child{border-bottom:1px solid #d8e8d8;border-radius:0 0 8px 8px;}
.form-row.done{border-left:3px solid #00703c;}
.form-row.missing{border-left:3px solid #e65100;}
.form-row-top{display:flex;align-items:center;gap:10px;cursor:pointer;}
.form-row.missing .form-row-top{cursor:default;}
.fr-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.fr-info{flex:1;min-width:0;}
.fr-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.fr-meta{font-size:11px;color:#666;margin-top:2px;font-family:'Courier New',monospace;}
.fr-missing{font-size:11px;color:#e65100;font-weight:600;margin-top:2px;}
.fr-chevron{font-size:18px;color:#aaa;transition:transform 0.2s;flex-shrink:0;line-height:1;}
.fr-chevron.open{transform:rotate(90deg);}
/* Expanded detail */
.rec-detail{display:none;margin-top:12px;border-top:2px solid #e8f5ee;padding-top:12px;}
.rec-detail.open{display:block;}
/* Detail metadata grid */
.rec-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.rmc{background:#f8faf8;border-radius:8px;padding:9px 11px;}
.rmc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:4px;}
.rmc-value{font-size:12px;color:#1a1a1a;line-height:1.4;}
.rmc-value.ok{color:#00703c;font-weight:700;font-family:'Courier New',monospace;}
.rmc-value.na{color:#bbb;font-style:italic;}
/* Corrective action box */
.rec-ca{background:#fff8e1;border-left:3px solid #e65100;border-radius:6px;padding:9px 12px;margin-bottom:10px;}
.rec-ca-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#e65100;margin-bottom:4px;}
.rec-ca-value{font-size:12px;color:#1a1a1a;white-space:pre-wrap;line-height:1.5;}
.rec-ca-none{font-size:12px;color:#bbb;font-style:italic;}
/* Signatures */
.rec-sigs{margin-bottom:10px;}
.rec-sigs-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:6px;}
.rec-sigs-row{display:flex;flex-wrap:wrap;gap:8px;}
.rec-sig-item{text-align:center;}
.rec-sig-img{display:block;width:90px;height:45px;object-fit:contain;background:white;border:1px solid #ddd;border-radius:6px;cursor:pointer;}
.rec-sig-name{font-size:9px;color:#999;margin-top:3px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-sig-none{font-size:11px;color:#bbb;font-style:italic;}
/* Photos */
.rec-photos{margin-bottom:10px;}
.rec-photos-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:6px;}
.rec-photo-row{display:flex;flex-wrap:wrap;gap:8px;}
.rec-photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid #d0d0d0;cursor:pointer;}
.rec-photo-none{font-size:11px;color:#bbb;font-style:italic;}
/* Delete */
.rec-delete-btn{width:100%;padding:9px;background:white;border:1.5px solid #d32f2f;color:#d32f2f;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
/* Previous weeks accordion */
.prev-header{margin:20px 14px 6px;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;}
.acc-item{margin:6px 14px 0;border-radius:10px;overflow:hidden;border:1.5px solid #d0ddd0;}
.acc-trigger{background:white;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.acc-trigger:active{background:#f0f7f0;}
.acc-left{flex:1;}
.acc-week{font-size:13px;font-weight:700;color:#1a1a1a;}
.acc-sub{font-size:11px;color:#666;margin-top:2px;}
.acc-badge{border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;flex-shrink:0;}
.acc-badge.full{background:#e8f5ee;color:#00703c;}
.acc-badge.partial{background:#fff3e0;color:#e65100;}
.acc-badge.empty{background:#f5f5f5;color:#aaa;}
.acc-chevron{font-size:18px;color:#aaa;transition:transform 0.2s;line-height:1;flex-shrink:0;}
.acc-chevron.open{transform:rotate(90deg);}
.acc-body{display:none;border-top:1px solid #e8e8e8;background:#fafafa;padding-bottom:8px;}
.acc-body.open{display:block;}
/* Tools */
.tools-section{margin:20px 14px 0;}
.tools-title{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;margin-bottom:8px;}
.tools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tool-btn{background:white;border:1.5px solid #c8d8c8;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;}
.tool-btn:active{border-color:#00703c;background:#e8f5ee;}
.tb-icon{font-size:24px;margin-bottom:5px;}
.tb-label{font-size:12px;font-weight:700;color:#1a1a1a;}
.tb-sub{font-size:10px;color:#888;margin-top:2px;}
.footer-space{height:40px;}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a1a;color:white;padding:13px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;font-family:inherit;}
</style>
</head>

<script>
var ALL_FORMS = [
  {id:'temp-meat',name:'Meat Dept Temperature',cat:'Temperature Checks'},
  {id:'temp-prepack',name:'Pre-pack Temperature',cat:'Temperature Checks'},
  {id:'temp-dairy',name:'Dairy Temperature',cat:'Temperature Checks'},
  {id:'temp-frozen',name:'Frozen Temperature',cat:'Temperature Checks'},
  {id:'temp-fruitveg',name:'Fruit & Veg Temperature',cat:'Temperature Checks'},
  {id:'temp-deli',name:'Deli Temperature',cat:'Temperature Checks'},
  {id:'hotfood-chicken-temp',name:'Chicken Unit Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-bar-temp',name:'Hot Food Bar Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-soup-temp',name:'Soup Kettle Hourly Temps',cat:'Hot Food & Deli'},
  {id:'hotfood-after-cook',name:'After Cook Check Sheet',cat:'Hot Food & Deli'},
  {id:'hotfood-greaseshield',name:'GreaseShield Maintenance',cat:'Hot Food & Deli'},
  {id:'hotfood-daily-clean',name:'Hot Food Daily Cleaning',cat:'Hot Food & Deli'},
  {id:'hotfood-weekly-clean',name:'Hot Food Weekly Cleaning',cat:'Hot Food & Deli'},
  {id:'cookedmeat-clean',name:'Cooked Meats Daily Cleaning',cat:'Hot Food & Deli'},
  {id:'cookedmeat-weekly-clean',name:'Cooked Meats Weekly Cleaning',cat:'Hot Food & Deli'},
  {id:'thawing-check',name:'Thawing Check Sheet',cat:'Hot Food & Deli'},
  {id:'deli-trace-stuffing',name:'Sandwich Log - Stuffing & Wraps',cat:'Deli Traceability'},
  {id:'deli-trace-butter',name:'Sandwich Log - Butter/Ham/Turkey',cat:'Deli Traceability'},
  {id:'deli-trace-chicken',name:'Sandwich Log - Chicken Tikka',cat:'Deli Traceability'},
  {id:'deli-trace-saladveg',name:'Sandwich Log - Salad Veg',cat:'Deli Traceability'},
  {id:'deli-trace-eggtuna',name:'Sandwich Log - Egg & Tuna',cat:'Deli Traceability'},
  {id:'trace-sandwich',name:'Pre-Pack Sandwich Tracker',cat:'Traceability Logs'},
  {id:'trace-wrap',name:'Pre-Pack Wrap Tracker',cat:'Traceability Logs'},
  {id:'trace-pizza',name:'Pre-Pack Pizza Tracker',cat:'Traceability Logs'},
  {id:'trace-salad-made',name:'Salads Made in Store',cat:'Traceability Logs'},
  {id:'trace-salad-prepack',name:'Pre-Pack Salads',cat:'Traceability Logs'},
  {id:'trace-savouries',name:'Savouries Traceability',cat:'Traceability Logs'},
  {id:'trace-cooked-meats',name:'Cooked Meat Traceability',cat:'Traceability Logs'},
  {id:'trace-salami',name:'Salami / Olives Traceability',cat:'Traceability Logs'},
  {id:'trace-cheese',name:'Cheese Traceability',cat:'Traceability Logs'},
  {id:'trace-fish',name:'Fish Tracker',cat:'Traceability Logs'},
  {id:'trace-pork',name:'Pork & Bacon Traceability',cat:'Traceability Logs'},
  {id:'trace-butcher',name:'Prep by Butcher/Fishmonger',cat:'Traceability Logs'},
  {id:'prod-mince',name:'Mince Control Sheet',cat:'Production Logs'},
  {id:'prod-burger',name:'Burger Control Sheet',cat:'Production Logs'},
  {id:'clean-redmeat',name:'Red Meat Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-fruitveg',name:'Fruit & Veg Cleaning',cat:'Cleaning Schedules'},
  {id:'clean-stockroom',name:'Stockroom Cleaning',cat:'Cleaning Schedules'},
  {id:'goods-chilled',name:'Goods Inwards Chilled/Frozen',cat:'Goods Inwards'},
  {id:'goods-ambient',name:'Goods Inwards Ambient',cat:'Goods Inwards'},
  {id:'compliance',name:'HACCP Compliance Report',cat:'Compliance'}
];

var DB_NAME = 'MoriartyHACCP', DB_VER = 1, db = null, allRecords = [];

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function getWeekKey() {
  var d = new Date();
  var s = new Date(d);
  s.setDate(d.getDate() - d.getDay());
  s.setHours(0, 0, 0, 0);
  return s.toISOString().split('T')[0];
}

function weekLabel(wk) {
  var s = new Date(wk + 'T00:00:00');
  var e = new Date(s);
  e.setDate(s.getDate() + 6);
  var opts = {day:'numeric', month:'short'};
  return s.toLocaleDateString('en-IE', opts) + ' \u2013 ' + e.toLocaleDateString('en-IE', opts) + ' ' + e.getFullYear();
}

function satMidnight(wk) {
  var s = new Date(wk + 'T00:00:00');
  s.setDate(s.getDate() + 6);
  s.setHours(23, 59, 59, 0);
  return s;
}

function timeRemaining(wk) {
  var diff = satMidnight(wk) - new Date();
  if (diff <= 0) return 'Week ended';
  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  return (d > 0 ? d + 'd ' : '') + h + 'h ' + m + 'm until close';
}

/* ---- IndexedDB ---- */
function openDB() {
  return new Promise(function(res, rej) {
    var done = false;
    var timer = setTimeout(function() {
      if (done) return; done = true;
      rej(new Error('Database timed out. Safari: Settings > Safari > uncheck Block All Cookies, then refresh.'));
    }, 5000);
    var req;
    try { req = indexedDB.open(DB_NAME, DB_VER); }
    catch(e) { clearTimeout(timer); rej(e); return; }
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('records')) {
        var s = d.createObjectStore('records', {keyPath:'id'});
        s.createIndex('formId','formId',{unique:false});
        s.createIndex('weekKey','weekKey',{unique:false});
      }
      if (!d.objectStoreNames.contains('weeks')) d.createObjectStore('weeks', {keyPath:'weekKey'});
    };
    req.onsuccess = function(e) { if (done) return; done=true; clearTimeout(timer); db=e.target.result; res(db); };
    req.onerror = function(e) { if (done) return; done=true; clearTimeout(timer); rej(e.target.error); };
    req.onblocked = function() { if (done) return; done=true; clearTimeout(timer); rej(new Error('Database blocked. Close other tabs and refresh.')); };
  });
}

function dbGetAll(store) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readonly');
    var req = tx.objectStore(store).getAll();
    req.onsuccess = function(e) { res(e.target.result); };
    req.onerror = function(e) { rej(e.target.error); };
  });
}

function dbDelete(store, key) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res;
    tx.onerror = function(e) { rej(e.target.error); };
  });
}

function dbPut(store, obj) {
  return new Promise(function(res, rej) {
    var tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(obj);
    tx.oncomplete = res;
    tx.onerror = function(e) { rej(e.target.error); };
  });
}

/* ---- Build latest-per-form map for a week ---- */
function buildByForm(recs, wk) {
  var byForm = {};
  for (var i = 0; i < recs.length; i++) {
    var r = recs[i];
    if (r.weekKey !== wk) continue;
    if (!byForm[r.formId] || r.savedAt > byForm[r.formId].savedAt) byForm[r.formId] = r;
  }
  return byForm;
}

/* ---- Render expanded record detail ---- */
function buildRecordDetail(rec) {
  var html = '';

  /* Metadata grid */
  var dt = new Date(rec.savedAt);
  var dtStr = dt.toLocaleString('en-IE', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false});
  html += '<div class="rec-meta-grid">';
  html += '<div class="rmc"><div class="rmc-label">Submitted</div><div class="rmc-value">' + escapeHtml(dtStr) + '</div></div>';
  html += '<div class="rmc"><div class="rmc-label">Food Safety Champion</div><div class="rmc-value ' + (rec.champion ? 'ok' : 'na') + '">' + escapeHtml(rec.champion || 'Not recorded') + '</div></div>';
  html += '<div class="rmc"><div class="rmc-label">Recorded Timestamp</div><div class="rmc-value ' + (rec.timestamp ? 'ok' : 'na') + '">' + escapeHtml(rec.timestamp || 'Not recorded') + '</div></div>';
  html += '<div class="rmc"><div class="rmc-label">Week Ending</div><div class="rmc-value">' + escapeHtml(rec.weekEnding || '\u2014') + '</div></div>';
  html += '</div>';

  /* Corrective action */
  if (rec.correctiveAction && rec.correctiveAction.trim()) {
    html += '<div class="rec-ca"><div class="rec-ca-label">&#9888;&#65039; Corrective Action Notes</div><div class="rec-ca-value">' + escapeHtml(rec.correctiveAction) + '</div></div>';
  }

  /* Signatures */
  html += '<div class="rec-sigs"><div class="rec-sigs-label">&#9999;&#65039; Signatures</div>';
  if (rec.signatures && rec.signatures.length) {
    var signed = [];
    for (var si = 0; si < rec.signatures.length; si++) {
      if (rec.signatures[si].hasSignature && rec.signatures[si].dataUrl) signed.push(rec.signatures[si]);
    }
    if (signed.length) {
      html += '<div class="rec-sigs-row">';
      for (var sgi = 0; sgi < signed.length; sgi++) {
        var lbl = signed[sgi].id.replace(/^sig-/, '').replace(/-/g, ' ');
        html += '<div class="rec-sig-item">';
        html += '<img class="rec-sig-img" src="' + signed[sgi].dataUrl + '" alt="Sig" data-lb="' + signed[sgi].dataUrl + '">';
        html += '<div class="rec-sig-name">' + escapeHtml(lbl) + '</div>';
        html += '</div>';
      }
      html += '</div>';
      var unsigned = rec.signatures.length - signed.length;
      if (unsigned > 0) html += '<div class="rec-sig-none" style="margin-top:4px">' + unsigned + ' signature field' + (unsigned > 1 ? 's' : '') + ' left blank</div>';
    } else {
      html += '<div class="rec-sig-none">No signatures captured</div>';
    }
  } else {
    html += '<div class="rec-sig-none">Not captured \u2014 re-save form to include</div>';
  }
  html += '</div>';

  /* Photos */
  html += '<div class="rec-photos"><div class="rec-photos-label">&#128247; Photo Evidence</div>';
  if (rec.photos && rec.photos.length) {
    html += '<div class="rec-photo-row">';
    for (var pi = 0; pi < rec.photos.length; pi++) {
      html += '<img class="rec-photo-thumb" src="' + rec.photos[pi].dataUrl + '" alt="Photo" data-lb="' + rec.photos[pi].dataUrl + '">';
    }
    html += '</div>';
  } else {
    html += '<div class="rec-photo-none">No photos attached</div>';
  }
  html += '</div>';

  /* Delete */
  html += '<button class="rec-delete-btn" data-delid="' + rec.id + '">&#128465; Delete this record</button>';
  return html;
}

/* ---- Attach listeners to a rendered container ---- */
function attachListeners(container) {
  /* Expand/collapse */
  var rows = container.querySelectorAll('.form-row.done');
  for (var i = 0; i < rows.length; i++) {
    (function(row) {
      var top = row.querySelector('.form-row-top');
      var detail = row.querySelector('.rec-detail');
      var chev = row.querySelector('.fr-chevron');
      if (!top || !detail) return;
      top.addEventListener('click', function() {
        var open = detail.className.indexOf('open') !== -1;
        detail.className = open ? 'rec-detail' : 'rec-detail open';
        chev.className = open ? 'fr-chevron' : 'fr-chevron open';
      });
    })(rows[i]);
  }

  /* Lightbox for photos and signatures */
  var lbItems = container.querySelectorAll('[data-lb]');
  for (var li = 0; li < lbItems.length; li++) {
    (function(el) {
      el.addEventListener('click', function() {
        document.getElementById('lbImg').src = el.getAttribute('data-lb');
        document.getElementById('lightbox').className = 'lightbox open';
      });
    })(lbItems[li]);
  }

  /* Delete buttons */
  var delBtns = container.querySelectorAll('.rec-delete-btn');
  for (var di = 0; di < delBtns.length; di++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var id = parseInt(btn.getAttribute('data-delid'), 10);
        if (!confirm('Delete this record? This cannot be undone.')) return;
        dbDelete('records', id).then(function() {
          showToast('Record deleted');
          loadRecords();
        }).catch(function() { showToast('Delete failed'); });
      });
    })(delBtns[di]);
  }
}

/* ---- Render category sections into a container ---- */
function renderSections(container, byForm) {
  var cats = [], catMap = {};
  for (var fi = 0; fi < ALL_FORMS.length; fi++) {
    var f = ALL_FORMS[fi];
    if (!catMap[f.cat]) { catMap[f.cat] = []; cats.push(f.cat); }
    catMap[f.cat].push(f);
  }
  var html = '';
  for (var ci = 0; ci < cats.length; ci++) {
    var cat = cats[ci];
    var forms = catMap[cat];
    var catDone = 0;
    for (var cfi = 0; cfi < forms.length; cfi++) { if (byForm[forms[cfi].id]) catDone++; }
    var catPct = Math.round(catDone / forms.length * 100);
    html += '<div class="section">';
    html += '<div class="section-head"><span>' + escapeHtml(cat) + '</span><span class="section-head-pct">' + catDone + '/' + forms.length + ' &nbsp;' + catPct + '%</span></div>';
    for (var ri = 0; ri < forms.length; ri++) {
      var form = forms[ri];
      var rec = byForm[form.id];
      if (rec) {
        var dt2 = new Date(rec.savedAt);
        var ts2 = dt2.toLocaleString('en-IE', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:false});
        var meta = ts2 + (rec.champion ? ' \u00b7 ' + escapeHtml(rec.champion) : '');
        html += '<div class="form-row done">';
        html += '<div class="form-row-top">';
        html += '<div class="fr-icon">\u2705</div>';
        html += '<div class="fr-info"><div class="fr-name">' + escapeHtml(form.name) + '</div><div class="fr-meta">' + meta + '</div></div>';
        html += '<div class="fr-chevron">&#8250;</div>';
        html += '</div>';
        html += '<div class="rec-detail">' + buildRecordDetail(rec) + '</div>';
        html += '</div>';
      } else {
        html += '<div class="form-row missing">';
        html += '<div class="form-row-top">';
        html += '<div class="fr-icon">\u26a0\ufe0f</div>';
        html += '<div class="fr-info"><div class="fr-name">' + escapeHtml(form.name) + '</div><div class="fr-missing">Not yet submitted this week</div></div>';
        html += '</div></div>';
      }
    }
    html += '</div>';
  }
  container.innerHTML = html;
  attachListeners(container);
}

/* ---- Main render ---- */
function render(recs) {
  allRecords = recs;
  var wk = getWeekKey();
  var byForm = buildByForm(recs, wk);
  var done = Object.keys(byForm).length;
  var total = ALL_FORMS.length;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;

  var sb = document.getElementById('statusBar');
  sb.textContent = '\u25cf Live \u00b7 ' + recs.length + ' record' + (recs.length !== 1 ? 's' : '') + ' stored \u00b7 ' + timeRemaining(wk);
  sb.className = 'status-bar';
  sb.style.cursor = '';

  var mc = document.getElementById('mainContent');
  mc.innerHTML =
    '<div class="week-card">' +
      '<div class="wc-label">Current Week</div>' +
      '<div class="wc-week">' + escapeHtml(weekLabel(wk)) + '</div>' +
      '<div class="wc-row">' +
        '<div><div class="wc-pct">' + pct + '%</div><div class="wc-pct-label">Complete</div></div>' +
        '<div class="wc-right"><div class="wc-count">' + done + ' / ' + total + ' forms</div><div class="wc-closes">Closes Saturday midnight</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="prog-wrap"><div class="prog-fill" style="width:' + pct + '%"></div></div>';

  var curDiv = document.createElement('div');
  mc.appendChild(curDiv);
  renderSections(curDiv, byForm);

  /* Previous weeks */
  var allWks = {};
  for (var i = 0; i < recs.length; i++) {
    if (recs[i].weekKey !== wk) allWks[recs[i].weekKey] = 1;
  }
  var prevKeys = Object.keys(allWks).sort().reverse();
  var pws = document.getElementById('prevWeeksSection');
  pws.innerHTML = '';
  if (!prevKeys.length) return;

  var hdr = document.createElement('div');
  hdr.className = 'prev-header';
  hdr.textContent = 'Previous Weeks (' + prevKeys.length + ')';
  pws.appendChild(hdr);

  for (var pi = 0; pi < prevKeys.length; pi++) {
    (function(pwk) {
      var pwByForm = buildByForm(recs, pwk);
      var pwDone = Object.keys(pwByForm).length;
      var pwPct = Math.round(pwDone / total * 100);
      var badgeClass = pwPct === 100 ? 'acc-badge full' : pwPct > 0 ? 'acc-badge partial' : 'acc-badge empty';

      var item = document.createElement('div');
      item.className = 'acc-item';

      var trigger = document.createElement('div');
      trigger.className = 'acc-trigger';
      trigger.innerHTML =
        '<div class="acc-left"><div class="acc-week">' + escapeHtml(weekLabel(pwk)) + '</div><div class="acc-sub">' + pwDone + ' / ' + total + ' forms completed</div></div>' +
        '<span class="' + badgeClass + '">' + pwPct + '%</span>' +
        '<span class="acc-chevron">&#8250;</span>';

      var body = document.createElement('div');
      body.className = 'acc-body';
      var inner = document.createElement('div');
      body.appendChild(inner);
      var built = false;

      trigger.addEventListener('click', function() {
        var isOpen = body.className.indexOf('open') !== -1;
        body.className = isOpen ? 'acc-body' : 'acc-body open';
        trigger.querySelector('.acc-chevron').className = isOpen ? 'acc-chevron' : 'acc-chevron open';
        if (!isOpen && !built) { renderSections(inner, pwByForm); built = true; }
      });

      item.appendChild(trigger);
      item.appendChild(body);
      pws.appendChild(item);
    })(prevKeys[pi]);
  }
}

function loadRecords() {
  dbGetAll('records').then(function(recs) { render(recs); }).catch(function(e) {
    var sb = document.getElementById('statusBar');
    sb.textContent = 'Error loading: ' + (e.message || 'unknown');
    sb.className = 'status-bar err';
  });
}

/* ---- Backup / Restore ---- */
function doBackup() {
  Promise.all([dbGetAll('records'), dbGetAll('weeks')]).then(function(results) {
    var data = {exportedAt: new Date().toISOString(), records: results[0], weeks: results[1]};
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'haccp-backup-' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  }).catch(function() { showToast('Backup failed'); });
}

function doRestore(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.records || !Array.isArray(data.records)) throw new Error('bad format');
      var puts = [];
      for (var ri = 0; ri < data.records.length; ri++) puts.push(dbPut('records', data.records[ri]));
      if (data.weeks && Array.isArray(data.weeks)) {
        for (var wi = 0; wi < data.weeks.length; wi++) puts.push(dbPut('weeks', data.weeks[wi]));
      }
      Promise.all(puts).then(function() {
        loadRecords();
        showToast('\u2705 Backup restored');
        document.getElementById('fileInput').value = '';
      }).catch(function() { showToast('Restore failed'); });
    } catch(err) { showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
}

/* ---- Boot ---- */
document.addEventListener('DOMContentLoaded', function() {

  document.getElementById('btnBack').addEventListener('click', function() {
    try { if (db) { db.close(); db = null; } } catch(e) {}
    window.location.href = 'index.html';
  });

  window.addEventListener('pagehide', function() {
    try { if (db) { db.close(); db = null; } } catch(e) {}
  });

  document.getElementById('btnBackup').addEventListener('click', doBackup);
  document.getElementById('btnRestore').addEventListener('click', function() { document.getElementById('fileInput').click(); });
  document.getElementById('fileInput').addEventListener('change', function() {
    if (this.files && this.files.length) doRestore(this.files[0]);
  });

  document.getElementById('lbClose').addEventListener('click', function() {
    document.getElementById('lightbox').className = 'lightbox';
    document.getElementById('lbImg').src = '';
  });
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) { this.className = 'lightbox'; document.getElementById('lbImg').src = ''; }
  });

  var sb = document.getElementById('statusBar');
  function bootDB() {
    sb.textContent = 'Connecting to database...';
    sb.className = 'status-bar';
    sb.style.cursor = '';
    openDB().then(function() { loadRecords(); }).catch(function(e) {
      sb.textContent = (e.message || 'Storage error') + ' \u2014 Tap to retry';
      sb.className = 'status-bar err';
      sb.style.cursor = 'pointer';
      sb.addEventListener('click', function handler() {
        sb.removeEventListener('click', handler);
        bootDB();
      });
    });
  }
  bootDB();
});
</script>
