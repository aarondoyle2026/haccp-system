<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh;}
.top-nav{background:#00703c;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}

.nav-title{font-size:17px;font-weight:700;flex:1;}

.status-bar{background:#005a30;color:white;text-align:center;padding:7px 16px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.02em;}

.week-card{margin:14px 14px 0;background:#00703c;border-radius:12px;padding:14px 16px;color:white;}
.wc-label{font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.75;text-transform:uppercase;}

.wc-pct{font-size:32px;font-weight:700;line-height:1;}
.wc-pct-label{font-size:11px;opacity:0.75;margin-top:2px;}
.wc-right{text-align:right;}
.wc-count{font-size:13px;font-weight:600;}
.wc-closes{font-size:11px;opacity:0.75;margin-top:2px;}
.prog-wrap{margin:10px 14px 0;background:white;border-radius:8px;overflow:hidden;height:10px;}
.prog-fill{height:100%;background:#00703c;border-radius:8px;transition:width 0.4s;}
.section{margin:12px 14px 0;}
.section-head{background:#1a1a1a;color:white;padding:9px 14px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.section-head-pct{font-size:12px;font-weight:700;opacity:0.8;}
.form-row{background:white;border-left:1px solid #d8e8d8;border-right:1px solid #d8e8d8;border-bottom:1px solid #ececec;padding:12px 14px;}
.form-row:last-child{border-bottom:1px solid #d8e8d8;border-radius:0 0 8px 8px;}
.form-row.done{border-left:3px solid #00703c;}
.form-row.missing{border-left:3px solid #e65100;}
.form-row-top{display:flex;align-items:center;gap:10px;cursor:pointer;}
.form-row.missing .form-row-top{cursor:default;}
.fr-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.fr-info{flex:1;min-width:0;}
.fr-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.fr-meta{font-size:11px;color:#666;margin-top:2px;font-family:'Courier New',monospace;}
.fr-missing{font-size:11px;color:#e65100;font-weight:600;margin-top:2px;}
.fr-chevron{font-size:18px;color:#aaa;transition:transform 0.2s;flex-shrink:0;line-height:1;}
.fr-chevron.open{transform:rotate(90deg);}
.rec-detail{display:none;margin-top:12px;border-top:2px solid #e8f5ee;padding-top:12px;}
.rec-detail.open{display:block;}
/* Meta grid */
.rec-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.rmc{background:#f8faf8;border-radius:8px;padding:9px 11px;}
.rmc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:4px;}
.rmc-value{font-size:12px;color:#1a1a1a;line-height:1.4;}
.rmc-value.ok{color:#00703c;font-weight:700;font-family:'Courier New',monospace;}
.rmc-value.na{color:#bbb;font-style:italic;}
/* Corrective action */
.rec-ca{background:#fff8e1;border-left:3px solid #e65100;border-radius:6px;padding:9px 12px;margin-bottom:12px;}
.rec-ca-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#e65100;margin-bottom:4px;}
.rec-ca-value{font-size:12px;color:#1a1a1a;white-space:pre-wrap;line-height:1.5;}
/* Inline form styles */
.inline-form-section{margin-bottom:14px;}
.inline-section-title{font-size:12px;font-weight:700;color:#005a30;margin:14px 0 8px;padding-bottom:5px;border-bottom:2px solid #e8f5ee;}
.field-label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;display:block;}
.field-input{width:100%;padding:9px 11px;border:1.5px solid #d0d0d0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a;-webkit-appearance:none;}
.field-input:focus{outline:none;border-color:#00703c;}
.field-row{display:flex;gap:10px;}
.field-row .field-group{flex:1;}
.field-group{margin-bottom:12px;}
.week-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px 8px;}
.week-table{border-collapse:collapse;width:100%;min-width:600px;font-size:12px;}
.week-table th{background:#00703c;color:white;padding:7px 5px;text-align:center;font-weight:600;font-size:11px;border:1px solid #005a30;white-space:nowrap;}
.week-table th.product-col{background:#005a30;text-align:left;padding-left:8px;min-width:130px;}
.week-table td{border:1px solid #d0d0d0;padding:4px 3px;text-align:center;vertical-align:middle;}
.week-table td.product-name{font-size:11px;font-weight:600;text-align:left;padding:6px 8px;background:#e8f5ee;line-height:1.3;}
.week-table td.product-name small{font-weight:400;color:#666;display:block;}
.week-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;color:#1a1a1a;}
.week-table input[type=text]:focus{outline:1px solid #00703c;border-radius:3px;background:#fffde7;}
.temp-table th.unit-col{min-width:160px;text-align:left;padding-left:8px;}
.temp-table th.temp-col{min-width:55px;}
.temp-table td.unit-name{text-align:left;padding:6px 8px;font-size:11px;background:#fafafa;}
.temp-table td.target{font-weight:600;color:#005a30;font-size:11px;background:#e8f5ee;}
.log-table{border-collapse:collapse;width:100%;font-size:12px;}
.log-table th{background:#00703c;color:white;padding:8px 6px;text-align:left;font-weight:600;font-size:11px;border:1px solid #005a30;}
.log-table td{border:1px solid #d0d0d0;padding:4px;vertical-align:middle;}
.log-table input[type=text]{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:4px 2px;color:#1a1a1a;}
.log-table tr:nth-child(even) td{background:#fafafa;}
.clean-table{border-collapse:collapse;width:100%;min-width:420px;font-size:12px;}

.clean-table th.area-col{text-align:left;padding-left:8px;min-width:150px;}
.clean-table th.chem-col{min-width:100px;text-align:left;padding-left:8px;}
.clean-table th.day-col{min-width:32px;}
.clean-table td{border:1px solid #d0d0d0;padding:5px 4px;text-align:center;vertical-align:middle;}
.clean-table td.area-name{text-align:left;padding:5px 8px;font-size:11px;background:#fafafa;}
.clean-table td.chem-name{text-align:left;padding:5px 8px;font-size:11px;color:#666;}
.clean-section-header{background:#005a30!important;color:white!important;font-weight:700!important;font-size:11px!important;text-align:left!important;padding:5px 8px!important;}
.clean-table input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#00703c;}
.clean-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;}
.hourly-table{border-collapse:collapse;width:100%;font-size:11px;min-width:700px;}
.hourly-table th{background:#00703c;color:white;padding:6px 4px;text-align:center;font-weight:600;font-size:10px;border:1px solid #005a30;white-space:nowrap;}
.hourly-table th.time-col{min-width:45px;background:#005a30;}
.hourly-table td{border:1px solid #d0d0d0;padding:3px 2px;text-align:center;vertical-align:middle;}
.hourly-table td.time-cell{background:#e8f5ee!important;font-weight:600;font-size:11px;}
.hourly-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:1px;}
.gs-table{border-collapse:collapse;width:100%;font-size:12px;min-width:600px;}
.gs-table th{background:#00703c;color:white;padding:7px 5px;font-size:11px;font-weight:600;border:1px solid #005a30;text-align:center;}
.gs-table th.day-col{text-align:left;padding-left:8px;min-width:90px;}
.gs-table td{border:1px solid #d0d0d0;padding:4px;text-align:center;vertical-align:middle;}
.gs-table td.day-name{text-align:left;padding:5px 8px;font-size:11px;background:#fafafa;font-weight:600;}
.gs-table td.week-header{background:#005a30!important;color:white!important;font-weight:700;font-size:11px;text-align:left;padding:5px 8px;}
.gs-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;}
.gs-table select{border:none;background:transparent;font-size:11px;font-family:inherit;width:100%;}
.cook-table{border-collapse:collapse;width:100%;font-size:12px;min-width:550px;}
.cook-table th{background:#00703c;color:white;padding:7px 5px;font-size:11px;font-weight:600;border:1px solid #005a30;text-align:left;padding-left:6px;}
.cook-table td{border:1px solid #d0d0d0;padding:4px;vertical-align:middle;}
.cook-table td.prod-name{text-align:left;padding:5px 8px;font-size:11px;background:#fafafa;}
.cook-table td.section-hdr{background:#005a30!important;color:white!important;font-weight:700;font-size:11px;text-align:left;padding:5px 8px;}
.cook-table input[type=text]{width:100%;border:none;background:transparent;font-size:11px;font-family:inherit;padding:2px;text-align:center;}
.deli-trace-table{border-collapse:collapse;width:100%;font-size:11px;min-width:640px;}
.deli-trace-table th{background:#00703c;color:white;padding:6px 4px;text-align:center;font-size:10px;font-weight:600;border:1px solid #005a30;white-space:nowrap;}
.deli-trace-table th.prod-col{background:#005a30;text-align:left;padding-left:8px;min-width:120px;}
.deli-trace-table td{border:1px solid #d0d0d0;padding:3px 2px;text-align:center;vertical-align:middle;}
.deli-trace-table td.prod-name{text-align:left;padding:5px 8px;font-size:11px;font-weight:600;background:#e8f5ee;}
.deli-trace-table input[type=text]{width:100%;border:none;background:transparent;text-align:center;font-size:10px;font-family:inherit;padding:1px;}
.compliance-table{border-collapse:collapse;width:100%;font-size:12px;}
.compliance-table th{background:#00703c;color:white;padding:7px 6px;text-align:left;font-size:11px;font-weight:600;border:1px solid #005a30;}
.compliance-table td{border:1px solid #d0d0d0;padding:6px;font-size:12px;vertical-align:middle;}
.compliance-table td.dept{font-weight:700;color:#005a30;background:#e8f5ee;}
.score-radio{display:flex;gap:6px;justify-content:center;}
.score-radio label{cursor:pointer;display:flex;flex-direction:column;align-items:center;font-size:10px;gap:2px;}
.score-radio input[type=radio]{accent-color:#00703c;}
.max-row td{background:#f5f5f5;font-weight:600;font-size:11px;}
.info-box{background:#e8f5ee;border-left:3px solid #00703c;border-radius:6px;padding:10px 12px;font-size:11px;color:#666;margin-bottom:14px;line-height:1.5;}
.info-box strong{color:#1a1a1a;}
.warn-box{background:#fff8e1;border-left:3px solid #e65100;border-radius:6px;padding:10px 12px;font-size:11px;color:#555;margin-bottom:14px;line-height:1.5;}
/* Photo & Timestamp & Signature section */
.photo-timestamp-box{background:white;border:1.5px solid #d0d0d0;border-radius:10px;overflow:hidden;margin-bottom:14px;}
.timestamp-display{background:#1e1e2e;color:#cdd6f4;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ts-icon{font-size:18px;}
.ts-text{font-family:'Courier New',monospace;font-size:13px;flex:1;min-width:160px;color:#a6e3a1;}

.photo-upload-area{padding:12px;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #d0d0d0;background:#f0f0f0;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;font-size:9px;padding:3px 5px;text-align:center;}
.sig-box{border:2px dashed #d0d0d0;border-radius:8px;background:white;position:relative;overflow:hidden;margin-bottom:8px;}
.sig-box canvas{display:block;width:100%;touch-action:none;}
.sig-clear{position:absolute;top:6px;right:8px;background:rgba(255,255,255,0.9);border:1px solid #d0d0d0;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:#d32f2f;}

.rec-sig-name{font-size:9px;color:#999;margin-top:2px;max-width:90px;}

.btn-save:active{background:#003d20;}

.prev-header{margin:20px 14px 6px;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;}

.acc-sub{font-size:11px;color:#666;margin-top:2px;}

.acc-badge.partial{background:#fff3e0;color:#e65100;}
.acc-badge.empty{background:#f5f5f5;color:#aaa;}
.acc-chevron{font-size:18px;color:#aaa;transition:transform 0.2s;line-height:1;flex-shrink:0;}
.acc-chevron.open{transform:rotate(90deg);}
.acc-body{display:none;border-top:1px solid #e8e8e8;background:#fafafa;padding-bottom:8px;}
.acc-body.open{display:block;}
/* Tools */
.tools-section{margin:20px 14px 0;}
.tools-title{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;margin-bottom:8px;}
.tools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tool-btn{background:white;border:1.5px solid #c8d8c8;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;}
.tool-btn:active{border-color:#00703c;background:#e8f5ee;}
.tb-icon{font-size:24px;margin-bottom:5px;}
.tb-label{font-size:12px;font-weight:700;color:#1a1a1a;}
.tb-sub{font-size:10px;color:#888;margin-top:2px;}
.footer-space{height:40px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a1a;color:white;padding:13px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;font-family:inherit;}
</style>
</head>

var DB_NAME = ‘MoriartyHACCP’, DB_VER = 1, db = null, allRecords = [];

function escapeHtml(str) {
return String(str == null ? ‘’ : str)
.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’)
.replace(/”/g,’"’).replace(/’/g,’'’);
}
function showToast(msg) {
var t = document.getElementById(‘toast’);
t.textContent = msg;
t.className = ‘toast show’;
setTimeout(function() { t.className = ‘toast’; }, 3000);
}
function getWeekKey() {
var d = new Date();
var s = new Date(d);
s.setDate(d.getDate() - d.getDay());
s.setHours(0,0,0,0);
return s.toISOString().split(‘T’)[0];
}
function weekLabel(wk) {
var s = new Date(wk + ‘T00:00:00’);
var e = new Date(s);
e.setDate(s.getDate() + 6);
var opts = {day:‘numeric’,month:‘short’};
return s.toLocaleDateString(‘en-IE’,opts) + ’ \u2013 ’ + e.toLocaleDateString(‘en-IE’,opts) + ’ ’ + e.getFullYear();
}
function satMidnight(wk) {
var s = new Date(wk + ‘T00:00:00’);
s.setDate(s.getDate() + 6);
s.setHours(23,59,59,0);
return s;
}
function timeRemaining(wk) {
var diff = satMidnight(wk) - new Date();
if (diff <= 0) return ‘Week ended’;
var d = Math.floor(diff / 86400000);
var h = Math.floor((diff % 86400000) / 3600000);
var m = Math.floor((diff % 3600000) / 60000);
return (d > 0 ? d + ’d ’ : ‘’) + h + ’h ’ + m + ‘m until close’;
}
function openDB() {
return new Promise(function(res, rej) {
var done = false;
var timer = setTimeout(function() {
if (done) return; done = true;
rej(new Error(‘Database timed out. Safari: Settings > Safari > uncheck Block All Cookies, then refresh.’));
}, 5000);
var req;
try { req = indexedDB.open(DB_NAME, DB_VER); }
catch(e) { clearTimeout(timer); rej(e); return; }
req.onupgradeneeded = function(e) {
var d2 = e.target.result;
if (!d2.objectStoreNames.contains(‘records’)) {
var st = d2.createObjectStore(‘records’,{keyPath:‘id’});
st.createIndex(‘formId’,‘formId’,{unique:false});
st.createIndex(‘weekKey’,‘weekKey’,{unique:false});
}
if (!d2.objectStoreNames.contains(‘weeks’)) d2.createObjectStore(‘weeks’,{keyPath:‘weekKey’});
};
req.onsuccess = function(e) { if (done) return; done=true; clearTimeout(timer); db=e.target.result; res(db); };
req.onerror = function(e) { if (done) return; done=true; clearTimeout(timer); rej(e.target.error); };
req.onblocked = function() { if (done) return; done=true; clearTimeout(timer); rej(new Error(‘Database blocked. Close other tabs and refresh.’)); };
});
}
function dbGetAll(store) {
return new Promise(function(res, rej) {
var tx = db.transaction(store,‘readonly’);
var req = tx.objectStore(store).getAll();
req.onsuccess = function(e) { res(e.target.result); };
req.onerror = function(e) { rej(e.target.error); };
});
}
function dbDelete(store, key) {
return new Promise(function(res, rej) {
var tx = db.transaction(store,‘readwrite’);
tx.objectStore(store).delete(key);
tx.oncomplete = res;
tx.onerror = function(e) { rej(e.target.error); };
});
}
function dbPut(store, obj) {
return new Promise(function(res, rej) {
var tx = db.transaction(store,‘readwrite’);
tx.objectStore(store).put(obj);
tx.oncomplete = res;
tx.onerror = function(e) { rej(e.target.error); };
});
}
function buildByForm(recs, wk) {
var byForm = {};
for (var i = 0; i < recs.length; i++) {
var r = recs[i];
if (r.weekKey !== wk) continue;
if (!byForm[r.formId] || r.savedAt > byForm[r.formId].savedAt) byForm[r.formId] = r;
}
return byForm;
}

/* =========================================================
SIGNATURE PADS (per-record instance tracking)
========================================================= */
var sigPads = {};
function initSig(canvasId) {
var canvas = document.getElementById(canvasId);
if (!canvas || sigPads[canvasId]) return;
canvas.width = canvas.parentElement.offsetWidth || 300;
canvas.height = parseInt(canvas.getAttribute(‘height’)) || 80;
var ctx = canvas.getContext(‘2d’);
ctx.strokeStyle = ‘#1a1a1a’;
ctx.lineWidth = 2;
ctx.lineCap = ‘round’;
ctx.lineJoin = ‘round’;
var drawing = false, lx = 0, ly = 0;
function getPos(e) {
var r = canvas.getBoundingClientRect();
var sx = canvas.width / r.width, sy = canvas.height / r.height;
if (e.touches) return {x:(e.touches[0].clientX-r.left)*sx, y:(e.touches[0].clientY-r.top)*sy};
return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
}
function start(e) { e.preventDefault(); drawing=true; var p=getPos(e); lx=p.x; ly=p.y; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); }
function move(e) { if(!drawing)return; e.preventDefault(); var p=getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; }
function stop() { drawing=false; }
canvas.addEventListener(‘mousedown’, start);
canvas.addEventListener(‘mousemove’, move);
canvas.addEventListener(‘mouseup’, stop);
canvas.addEventListener(‘mouseleave’, stop);
canvas.addEventListener(‘touchstart’, start, {passive:false});
canvas.addEventListener(‘touchmove’, move, {passive:false});
canvas.addEventListener(‘touchend’, stop);
sigPads[canvasId] = {clear: function() { ctx.clearRect(0,0,canvas.width,canvas.height); }};
}

if (!recPhotos[recKey]) recPhotos[recKey] = [];

for (var fi = 0; fi < files.length; fi++) {
(function(file) {
var reader = new FileReader();
reader.onload = function(e) {

var obj = {dataUrl:e.target.result, name:file.name, timestamp:ts};
var idx = recPhotos[recKey].push(obj) - 1;
renderRecPhotoThumb(document.getElementById(‘rec-photo-grid-’ + recKey), obj, recKey, idx);
};
reader.readAsDataURL(file);
})(files[fi]);
}
}
function renderRecPhotoThumb(grid, photo, recKey, idx) {

div.appendChild(img); div.appendChild(lbl);
grid.appendChild(div);
}

/* =========================================================
ATTACH LISTENERS
========================================================= */
function attachListeners(container) {
/* Expand/collapse done rows */
var rows = container.querySelectorAll(’.form-row.done’);
for (var i = 0; i < rows.length; i++) {
(function(row) {
var top = row.querySelector(’.form-row-top’);
var detail = row.querySelector(’.rec-detail’);
var chev = row.querySelector(’.fr-chevron’);
if (!top || !detail) return;
top.addEventListener(‘click’, function() {
var open = detail.className.indexOf(‘open’) !== -1;
if (!open) {
detail.className = ‘rec-detail open’;
chev.className = ‘fr-chevron open’;
/* Init signature pads after expanding */
setTimeout(function() {
var canvases = detail.querySelectorAll(‘canvas’);
for (var ci = 0; ci < canvases.length; ci++) {
initSig(canvases[ci].id);
}
}, 80);
} else {
detail.className = ‘rec-detail’;
chev.className = ‘fr-chevron’;
}
});
})(rows[i]);
}

/* Lightbox for saved photos and signatures */
var lbItems = container.querySelectorAll(’[data-lb]’);
for (var li = 0; li < lbItems.length; li++) {
(function(el) {
el.addEventListener(‘click’, function() { openLightbox(el.getAttribute(‘data-lb’)); });
})(lbItems[li]);
}

/* Timestamp buttons */
var tsBtns = container.querySelectorAll(’[data-tsrec]’);
for (var ti = 0; ti < tsBtns.length; ti++) {
(function(btn) {
btn.addEventListener(‘click’, function() {
var key = btn.getAttribute(‘data-tsrec’);
var now = new Date();
var ts = now.toLocaleString(‘en-IE’,{weekday:‘short’,year:‘numeric’,month:‘short’,day:‘numeric’,hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’,timeZone:‘Europe/Dublin’,hour12:false});
recTimestamps[key] = ts;
var el = document.getElementById(‘ts-text-’ + key);
if (el) { el.textContent = ts; el.className = ‘ts-text recorded’; }
showToast(‘Timestamp recorded’);
});
})(tsBtns[ti]);
}

/* Photo inputs */
var photoInputs = container.querySelectorAll(’[data-recphoto]’);
for (var phi = 0; phi < photoInputs.length; phi++) {
(function(inp) {
inp.addEventListener(‘change’, function() {
handleRecPhotos(inp, inp.getAttribute(‘data-recphoto’));
});
})(photoInputs[phi]);
}

/* Sig clear buttons */
var sigBtns = container.querySelectorAll(’.sig-clear’);
for (var sgi = 0; sgi < sigBtns.length; sgi++) {
(function(btn) {
btn.addEventListener(‘click’, function() {
var sid = btn.getAttribute(‘data-sigid’);
if (sid && sigPads[sid]) sigPads[sid].clear();
});
})(sigBtns[sgi]);
}

/* Delete buttons */
var delBtns = container.querySelectorAll(’.rec-delete-btn’);
for (var di = 0; di < delBtns.length; di++) {
(function(btn) {
btn.addEventListener(‘click’, function() {
var id = parseInt(btn.getAttribute(‘data-delid’), 10);
if (!confirm(‘Delete this record? This cannot be undone.’)) return;
dbDelete(‘records’, id).then(function() {
showToast(‘Record deleted’);
loadRecords();
}).catch(function() { showToast(‘Delete failed’); });
});
})(delBtns[di]);
}
}

/* =========================================================
RENDER CATEGORY SECTIONS
========================================================= */
function renderSections(container, byForm) {
var cats = [], catMap = {};
for (var fi = 0; fi < ALL_FORMS.length; fi++) {
var f = ALL_FORMS[fi];
if (!catMap[f.cat]) { catMap[f.cat] = []; cats.push(f.cat); }
catMap[f.cat].push(f);
}
var html = ‘’;
for (var ci = 0; ci < cats.length; ci++) {
var cat = cats[ci];
var forms = catMap[cat];
var catDone = 0;
for (var cfi = 0; cfi < forms.length; cfi++) { if (byForm[forms[cfi].id]) catDone++; }
var catPct = Math.round(catDone / forms.length * 100);
html += ‘<div class="section">’;
html += ‘<div class="section-head"><span>’ + escapeHtml(cat) + ‘</span><span class="section-head-pct">’ + catDone + ‘/’ + forms.length + ’  ’ + catPct + ‘%</span></div>’;
for (var ri = 0; ri < forms.length; ri++) {
var form = forms[ri];
var rec = byForm[form.id];
if (rec) {
var dt2 = new Date(rec.savedAt);
var ts2 = dt2.toLocaleString(‘en-IE’,{day:‘2-digit’,month:‘short’,hour:‘2-digit’,minute:‘2-digit’,hour12:false});

html += ‘<div class="form-row done">’;
html += ‘<div class="form-row-top">’;
html += ‘<div class="fr-icon">\u2705</div>’;
html += ‘<div class="fr-info"><div class="fr-name">’ + escapeHtml(form.name) + ‘</div><div class="fr-meta">’ + meta + ‘</div></div>’;
html += ‘<div class="fr-chevron">›</div>’;
html += ‘</div>’;
html += ‘<div class="rec-detail">’ + buildRecordDetail(rec, pkey) + ‘</div>’;
html += ‘</div>’;
} else {
html += ‘<div class="form-row missing">’;
html += ‘<div class="form-row-top">’;
html += ‘<div class="fr-icon">\u26a0\ufe0f</div>’;

html += ‘</div></div>’;
}
}
html += ‘</div>’;
}
container.innerHTML = html;
attachListeners(container);
}

trigger.className = ‘acc-trigger’;
trigger.innerHTML =
‘<div class="acc-left"><div class="acc-week">’ + escapeHtml(weekLabel(pwk)) + ‘</div><div class="acc-sub">’ + pwDone + ’ / ’ + total + ’ forms completed</div></div>’ +
‘<span class="' + badgeClass + '">’ + pwPct + ‘%</span>’ +
‘<span class="acc-chevron">›</span>’;
var body = document.createElement(‘div’);
body.className = ‘acc-body’;
var inner = document.createElement(‘div’);
body.appendChild(inner);
var built = false;
trigger.addEventListener(‘click’, function() {
var isOpen = body.className.indexOf(‘open’) !== -1;
body.className = isOpen ? ‘acc-body’ : ‘acc-body open’;
trigger.querySelector(’.acc-chevron’).className = isOpen ? ‘acc-chevron’ : ‘acc-chevron open’;
if (!isOpen && !built) { renderSections(inner, pwByForm); built = true; }
});
item.appendChild(trigger);
item.appendChild(body);
pws.appendChild(item);
})(prevKeys[pi]);
}
}

function loadRecords() {
dbGetAll(‘records’).then(function(recs) { render(recs); }).catch(function(e) {
var sb = document.getElementById(‘statusBar’);
sb.textContent = ’Error loading: ’ + (e.message || ‘unknown’);
sb.className = ‘status-bar err’;
});
}

/* =========================================================
BACKUP / RESTORE
========================================================= */
function doBackup() {
Promise.all([dbGetAll(‘records’), dbGetAll(‘weeks’)]).then(function(results) {
var data = {exportedAt: new Date().toISOString(), records: results[0], weeks: results[1]};
var blob = new Blob([JSON.stringify(data, null, 2)], {type:‘application/json’});
var url = URL.createObjectURL(blob);
var a = document.createElement(‘a’);
a.href = url;
a.download = ‘haccp-backup-’ + new Date().toISOString().split(‘T’)[0] + ‘.json’;
document.body.appendChild(a); a.click(); document.body.removeChild(a);
URL.revokeObjectURL(url);
showToast(‘Backup downloaded’);
}).catch(function() { showToast(‘Backup failed’); });
}
function doRestore(file) {
var reader = new FileReader();
reader.onload = function(e) {
try {
var data = JSON.parse(e.target.result);
if (!data.records || !Array.isArray(data.records)) throw new Error(‘bad format’);
var puts = [];
for (var ri = 0; ri < data.records.length; ri++) puts.push(dbPut(‘records’, data.records[ri]));
if (data.weeks && Array.isArray(data.weeks)) {
for (var wi = 0; wi < data.weeks.length; wi++) puts.push(dbPut(‘weeks’, data.weeks[wi]));
}
Promise.all(puts).then(function() {
loadRecords();
showToast(’\u2705 Backup restored’);
document.getElementById(‘fileInput’).value = ‘’;
}).catch(function() { showToast(‘Restore failed’); });
} catch(err) { showToast(‘Invalid backup file’); }
};
reader.readAsText(file);
}

/* =========================================================
BOOT
========================================================= */
document.addEventListener(‘DOMContentLoaded’, function() {
document.getElementById(‘btnBack’).addEventListener(‘click’, function() {
try { if (db) { db.close(); db = null; } } catch(e) {}
window.location.href = ‘index.html’;
});
window.addEventListener(‘pagehide’, function() {
try { if (db) { db.close(); db = null; } } catch(e) {}
});
document.getElementById(‘btnBackup’).addEventListener(‘click’, doBackup);
document.getElementById(‘btnRestore’).addEventListener(‘click’, function() { document.getElementById(‘fileInput’).click(); });
document.getElementById(‘fileInput’).addEventListener(‘change’, function() {
if (this.files && this.files.length) doRestore(this.files[0]);
});
document.getElementById(‘lbClose’).addEventListener(‘click’, closeLightbox);
document.getElementById(‘lightbox’).addEventListener(‘click’, function(e) {
if (e.target === this) closeLightbox();
});

var sb = document.getElementById(‘statusBar’);
function bootDB() {
sb.textContent = ‘Connecting to database…’;
sb.className = ‘status-bar’;
sb.style.cursor = ‘’;
openDB().then(function() { loadRecords(); }).catch(function(e) {
sb.textContent = (e.message || ‘Storage error’) + ’ \u2014 Tap to retry’;
sb.className = ‘status-bar err’;
sb.style.cursor = ‘pointer’;
sb.addEventListener(‘click’, function handler() {
sb.removeEventListener(‘click’, handler);
bootDB();
});
});
}
bootDB();
});
</script>
