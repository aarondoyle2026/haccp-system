<!DOCTYPE html><html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Weekly Report – Moriarty Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f4f6f4;color:#1a1a1a;}
.screen-header{background:#00703c;color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.screen-header h1{font-size:16px;font-weight:700;}
.screen-header .btn-print{background:white;color:#00703c;border:none;padding:8px 16px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.screen-header .btn-back{background:rgba(255,255,255,0.2);color:white;border:none;padding:8px 14px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;}
.loading{text-align:center;padding:60px 20px;font-size:16px;color:#666;}
.error{text-align:center;padding:60px 20px;font-size:16px;color:#c00;}
/* Report layout */
.report{max-width:900px;margin:0 auto;padding:20px;}
.report-header{background:white;border-radius:12px;padding:24px;margin-bottom:20px;border-top:6px solid #00703c;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.report-header .store{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00703c;margin-bottom:6px;}
.report-header h2{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.report-header .meta{font-size:13px;color:#666;margin-top:8px;}
.report-header .stats{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;}
.stat-box{background:#f4f6f4;border-radius:8px;padding:12px 16px;flex:1;min-width:120px;}
.stat-box .val{font-size:24px;font-weight:700;color:#00703c;}
.stat-box .lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
/* Category sections */
.cat-block{margin-bottom:24px;}
.cat-header{background:#1a1a1a;color:white;padding:10px 16px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;}
.cat-pct{opacity:0.7;}
/* Form blocks */
.form-block{background:white;border:1px solid #d0d0d0;border-top:none;padding:0;}
.form-block:last-child{border-radius:0 0 8px 8px;}
.form-title-bar{background:#e8f5ee;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #d0d0d0;cursor:pointer;}
.form-title-bar .icon{font-size:16px;}
.form-title-bar .name{font-size:14px;font-weight:700;color:#005a30;flex:1;}
.form-title-bar .save-count{font-size:11px;color:#666;font-weight:400;}
.form-title-bar .toggle{color:#666;font-size:18px;transition:transform 0.2s;}
.form-title-bar.open .toggle{transform:rotate(90deg);}
.form-missing .form-title-bar{background:#fff8f0;}
.form-missing .name{color:#e65100;}
.form-saves{display:none;padding:0;}
.form-saves.open{display:block;}
/* Individual save */
.save-block{border-bottom:1px solid #eee;padding:16px;}
.save-block:last-child{border-bottom:none;}
.save-header{background:#005a30;color:white;border-radius:6px;padding:8px 14px;margin-bottom:12px;}
.save-header .time{font-size:13px;font-weight:700;}
.save-header .who{font-size:11px;opacity:0.85;margin-top:3px;}
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.meta-cell{background:#f8faf8;border-radius:6px;padding:8px 10px;}
.meta-cell .lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:#999;letter-spacing:0.06em;margin-bottom:3px;}
.meta-cell .val{font-size:12px;color:#1a1a1a;}
.meta-cell .val.ts{color:#00703c;font-weight:600;font-family:'Courier New',monospace;}
.ca-box{background:#fff8e1;border-left:3px solid #e65100;border-radius:5px;padding:8px 12px;margin-bottom:12px;font-size:12px;}
.ca-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:#e65100;margin-bottom:3px;}
/* Signatures */
.sigs-section{margin-bottom:12px;}
.sigs-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:8px;letter-spacing:0.06em;}
.sigs-row{display:flex;flex-wrap:wrap;gap:12px;}
.sig-item{text-align:center;}
.sig-item img{display:block;width:120px;height:60px;object-fit:contain;background:white;border:1px solid #ddd;border-radius:5px;}
.sig-item .sig-name{font-size:10px;color:#999;margin-top:4px;}
/* Photos */
.photos-section{margin-bottom:12px;}
.photos-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:8px;letter-spacing:0.06em;}
.photos-row{display:flex;flex-wrap:wrap;gap:10px;}
.photos-row img{width:100px;height:100px;object-fit:cover;border-radius:8px;border:1px solid #ddd;cursor:pointer;}
/* Field data */
.field-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px;}
.field-table td{border:1px solid #e0e0e0;padding:5px 8px;vertical-align:top;}
.field-table td:first-child{background:#f5f5f5;color:#666;width:45%;font-size:10px;}
.field-table td:last-child{color:#1a1a1a;font-weight:600;}
.no-saves{padding:16px;font-size:13px;color:#e65100;font-weight:600;}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;}

/* ===== FORM LAYOUT STYLES ===== */
.section-divider{background:#00703c;color:white;padding:12px 20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:30px 0 0;border-radius:8px 8px 0 0;}
.form-sheet{background:white;border:1px solid #d0d0d0;border-top:none;margin-bottom:4px;page-break-inside:avoid;}
.form-sheet:last-child{border-radius:0 0 8px 8px;margin-bottom:24px;}
.form-sheet-header{background:#e8f5ee;border-bottom:3px solid #00703c;padding:12px 16px;}
.form-sheet-header h3{font-size:15px;font-weight:700;color:#005a30;}
.form-sheet-body{padding:16px;overflow-x:auto;}
.week-table{border-collapse:collapse;width:100%;font-size:11px;}
.week-table th{background:#00703c;color:white;padding:5px 4px;text-align:center;font-weight:600;border:1px solid #005a30;white-space:nowrap;font-size:10px;}
.week-table th.prod-col{background:#005a30;text-align:left;padding-left:8px;min-width:130px;}
.week-table th.target-col{background:#005a30;min-width:55px;}
.week-table td{border:1px solid #d0d0d0;padding:5px 4px;text-align:center;vertical-align:middle;font-size:11px;}
.week-table td.unit-name{text-align:left;padding:5px 8px;background:#fafafa;font-weight:500;}
.week-table td.target{color:#005a30;font-weight:700;background:#e8f5ee;}
.week-table td.filled{background:#e8f5ee;font-weight:700;color:#1a1a1a;}
.week-table td.section-hdr{background:#005a30;color:white;font-weight:700;text-align:left;padding:4px 8px;}
.clean-table{border-collapse:collapse;width:100%;font-size:11px;}
.clean-table th{background:#00703c;color:white;padding:5px 4px;font-size:10px;font-weight:600;border:1px solid #005a30;text-align:center;}
.clean-table th.area-col{text-align:left;padding-left:8px;min-width:180px;}
.clean-table th.chem-col{text-align:left;padding-left:8px;min-width:120px;}
.clean-table td{border:1px solid #d0d0d0;padding:4px;text-align:center;vertical-align:middle;font-size:11px;}
.clean-table td.area-name{text-align:left;padding:4px 8px;background:#fafafa;}
.clean-table td.chem-name{text-align:left;padding:4px 8px;color:#666;font-size:10px;}
.clean-table td.filled{background:#e8f5ee;font-weight:700;}
.log-table{border-collapse:collapse;width:100%;font-size:11px;}
.log-table th{background:#00703c;color:white;padding:5px 6px;text-align:left;font-size:10px;font-weight:600;border:1px solid #005a30;}
.log-table td{border:1px solid #d0d0d0;padding:5px;font-size:11px;vertical-align:middle;}
.log-table td.filled{background:#e8f5ee;font-weight:600;}
.log-table tr:nth-child(even) td{background:#fafafa;}
.log-table tr:nth-child(even) td.filled{background:#d4edda;}
.no-data-form{padding:12px 16px;font-size:12px;color:#999;font-style:italic;}
@media print {
.section-divider{page-break-before:always;}
.form-sheet{page-break-inside:avoid;}
.save-block{page-break-inside:avoid;}
}

/* Print styles */
@media print {
body{background:white;}
.screen-header{display:none!important;}
.report{padding:0;max-width:100%;}
.report-header{box-shadow:none;border-radius:0;margin-bottom:12px;}
.form-saves{display:block!important;}
.form-title-bar .toggle{display:none;}
.cat-block{page-break-inside:avoid;}
.save-block{page-break-inside:avoid;}
.lightbox{display:none!important;}
.photos-row img{width:80px;height:80px;}
.sig-item img{width:100px;height:50px;}
}
</style>

</head>

<div class="screen-header" id="screenHeader">
  <a class="btn-back" href="records.html">&#8592; Records</a>

<div id="content"><div class="loading">&#128203; Loading report...</div></div>

  <button class="lb-close" onclick="document.getElementById('lightbox').className='lightbox'">&#10005;</button>
  <img id="lbImg" src="" alt="">
</div>
<script>
var SB_URL='https://mnebkteiwjxbbmnfotse.supabase.co';
var SB_KEY='sb_publishable_eutRHOftOW4ZJNlVrDKXOg_XtnBQ7cM';
var ALL_FORMS=[{id:'temp-meat',name:'Meat Dept Temperature',cat:'Temperature Checks'},{id:'temp-prepack',name:'Pre-pack Temperature',cat:'Temperature Checks'},{id:'temp-dairy',name:'Dairy Temperature',cat:'Temperature Checks'},{id:'temp-frozen',name:'Frozen Temperature',cat:'Temperature Checks'},{id:'temp-fruitveg',name:'Fruit & Veg Temperature',cat:'Temperature Checks'},{id:'temp-deli',name:'Deli Temperature',cat:'Temperature Checks'},{id:'hotfood-chicken-temp',name:'Chicken Unit Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-bar-temp',name:'Hot Food Bar Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-soup-temp',name:'Soup Kettle Hourly Temps',cat:'Hot Food & Deli'},{id:'hotfood-after-cook',name:'After Cook Check Sheet',cat:'Hot Food & Deli'},{id:'hotfood-greaseshield',name:'GreaseShield Maintenance',cat:'Hot Food & Deli'},{id:'hotfood-daily-clean',name:'Hot Food Daily Cleaning',cat:'Hot Food & Deli'},{id:'hotfood-weekly-clean',name:'Hot Food Weekly Cleaning',cat:'Hot Food & Deli'},{id:'cookedmeat-clean',name:'Cooked Meats Daily Cleaning',cat:'Hot Food & Deli'},{id:'cookedmeat-weekly-clean',name:'Cooked Meats Weekly Cleaning',cat:'Hot Food & Deli'},{id:'thawing-check',name:'Thawing Check Sheet',cat:'Hot Food & Deli'},{id:'deli-trace-stuffing',name:'Sandwich Log - Stuffing & Wraps',cat:'Deli Traceability'},{id:'deli-trace-butter',name:'Sandwich Log - Butter/Ham/Turkey',cat:'Deli Traceability'},{id:'deli-trace-chicken',name:'Sandwich Log - Chicken Tikka',cat:'Deli Traceability'},{id:'deli-trace-saladveg',name:'Sandwich Log - Salad Veg',cat:'Deli Traceability'},{id:'deli-trace-eggtuna',name:'Sandwich Log - Egg & Tuna',cat:'Deli Traceability'},{id:'trace-sandwich',name:'Pre-Pack Sandwich Tracker',cat:'Traceability Logs'},{id:'trace-wrap',name:'Pre-Pack Wrap Tracker',cat:'Traceability Logs'},{id:'trace-pizza',name:'Pre-Pack Pizza Tracker',cat:'Traceability Logs'},{id:'trace-salad-made',name:'Salads Made in Store',cat:'Traceability Logs'},{id:'trace-salad-prepack',name:'Pre-Pack Salads',cat:'Traceability Logs'},{id:'trace-savouries',name:'Savouries Traceability',cat:'Traceability Logs'},{id:'trace-cooked-meats',name:'Cooked Meat Traceability',cat:'Traceability Logs'},{id:'trace-salami',name:'Salami / Olives Traceability',cat:'Traceability Logs'},{id:'trace-cheese',name:'Cheese Traceability',cat:'Traceability Logs'},{id:'trace-fish',name:'Fish Tracker',cat:'Traceability Logs'},{id:'trace-pork',name:'Pork & Bacon Traceability',cat:'Traceability Logs'},{id:'trace-butcher',name:'Prep by Butcher/Fishmonger',cat:'Traceability Logs'},{id:'prod-mince',name:'Mince Control Sheet',cat:'Production Logs'},{id:'prod-burger',name:'Burger Control Sheet',cat:'Production Logs'},{id:'clean-redmeat',name:'Red Meat Cleaning',cat:'Cleaning Schedules'},{id:'clean-fruitveg',name:'Fruit & Veg Cleaning',cat:'Cleaning Schedules'},{id:'clean-stockroom',name:'Stockroom Cleaning',cat:'Cleaning Schedules'},{id:'goods-chilled',name:'Goods Inwards Chilled/Frozen',cat:'Goods Inwards'},{id:'goods-ambient',name:'Goods Inwards Ambient',cat:'Goods Inwards'},{id:'compliance',name:'HACCP Compliance Report',cat:'Compliance'}];
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getWeekKey(){var d=new Date(),s=new Date(d);s.setDate(d.getDate()-d.getDay());s.setHours(0,0,0,0);return s.toISOString().split('T')[0];}
function weekLabel(wk){var s=new Date(wk+'T00:00:00'),e=new Date(s);e.setDate(s.getDate()+6);var o={day:'numeric',month:'long'};return s.toLocaleDateString('en-IE',o)+' \u2013 '+e.toLocaleDateString('en-IE',o)+' '+e.getFullYear();}
function normaliseRow(r){
  if(r.data&&typeof r.data==='object'){
    var sigs=[];
    if(r.data.signatures&&r.data.signatures.length){
      for(var si=0;si<r.data.signatures.length;si++){
        var s=r.data.signatures[si];
        sigs.push({id:s.id,hasSignature:s.hasSignature,src:s.url||s.dataUrl||null});
      }
    }
    var photos=[];
    if(r.data.photos&&r.data.photos.length){
      for(var pi=0;pi<r.data.photos.length;pi++){
        var p=r.data.photos[pi];
        photos.push({name:p.name||'',timestamp:p.timestamp||'',src:p.url||p.dataUrl||null});
      }
    }
    return {
      id:r.id,formId:r.form_id||r.formId,weekKey:r.week_key||r.weekKey,
      savedAt:r.saved_at||r.savedAt,champion:r.data.champion||'',
      weekEnding:r.data.weekEnding||'',timestamp:r.data.timestamp||'',
      correctiveAction:r.data.correctiveAction||'',
      fieldData:r.data.fieldData||{},photoCount:r.data.photoCount||0,
      signatures:sigs,photos:photos
    };
  }
  /* local record */
  var lsigs=[];
  if(r.signatures&&r.signatures.length){
    for(var ls=0;ls<r.signatures.length;ls++){
      var lsig=r.signatures[ls];
      lsigs.push({id:lsig.id,hasSignature:lsig.hasSignature,src:lsig.url||lsig.dataUrl||null});
    }
  }
  var lphotos=[];
  if(r.photos&&r.photos.length){
    for(var lp=0;lp<r.photos.length;lp++){
      var lphoto=r.photos[lp];
      lphotos.push({name:lphoto.name||'',timestamp:lphoto.timestamp||'',src:lphoto.url||lphoto.src||lphoto.dataUrl||null});
    }
  }
  return {
    id:r.id,formId:r.formId,weekKey:r.weekKey,savedAt:r.savedAt,
    champion:r.champion||'',weekEnding:r.weekEnding||'',timestamp:r.timestamp||'',
    correctiveAction:r.correctiveAction||'',fieldData:r.fieldData||{},
    photoCount:r.photoCount||0,signatures:lsigs,photos:lphotos
  };
}
function renderSave(sv){
  var dt=new Date(sv.savedAt);
  var ts=dt.toLocaleString('en-IE',{weekday:'long',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  var html='<div class="save-block">';
  html+='<div class="save-header"><div class="time">&#128336; '+esc(ts)+'</div>';
  if(sv.champion) html+='<div class="who">&#128100; Food Safety Champion: '+esc(sv.champion)+'</div>';
  html+='</div>';
  /* meta */
  html+='<div class="meta-row">';
  html+='<div class="meta-cell"><div class="lbl">Submitted</div><div class="val">'+esc(new Date(sv.savedAt).toLocaleString('en-IE',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}))+'</div></div>';
  html+='<div class="meta-cell"><div class="lbl">Week Ending</div><div class="val">'+(sv.weekEnding?esc(sv.weekEnding):'&mdash;')+'</div></div>';
  if(sv.timestamp) html+='<div class="meta-cell"><div class="lbl">Timestamp</div><div class="val ts">'+esc(sv.timestamp)+'</div></div>';
  html+='</div>';
  /* corrective action */
  if(sv.correctiveAction&&sv.correctiveAction.trim()&&sv.correctiveAction!=='None'){
    html+='<div class="ca-box"><div class="ca-lbl">&#9888;&#65039; Corrective Action</div>'+esc(sv.correctiveAction)+'</div>';
  }
  /* signatures */
  if(sv.signatures&&sv.signatures.length){
    var hasSigs=false;
    for(var si=0;si<sv.signatures.length;si++){if(sv.signatures[si].hasSignature&&sv.signatures[si].src)hasSigs=true;}
    if(hasSigs){
      html+='<div class="sigs-section"><div class="sigs-label">&#9999;&#65039; Signatures</div><div class="sigs-row">';
      for(var si2=0;si2<sv.signatures.length;si2++){
        var sig=sv.signatures[si2];
        if(sig.hasSignature&&sig.src){
          var sname=sig.id.replace(/^sig-/,'').replace(/-/g,' ');
          html+='<div class="sig-item"><img src="'+esc(sig.src)+'" alt="'+esc(sname)+'" onclick="openLb(this.src)"><div class="sig-name">'+esc(sname)+'</div></div>';
        }
      }
      html+='</div></div>';
    }
  }
  /* photos */
  if(sv.photos&&sv.photos.length){
    var hasPhotos=false;
    for(var pi=0;pi<sv.photos.length;pi++){if(sv.photos[pi].src)hasPhotos=true;}
    if(hasPhotos){
      html+='<div class="photos-section"><div class="photos-label">&#128247; Photo Evidence ('+sv.photos.length+')</div><div class="photos-row">';
      for(var pi2=0;pi2<sv.photos.length;pi2++){
        if(sv.photos[pi2].src) html+='<img src="'+esc(sv.photos[pi2].src)+'" alt="photo" onclick="openLb(this.src)" title="'+esc(sv.photos[pi2].timestamp)+'">';
      }
      html+='</div></div>';
    }
  }
  /* field data */
  if(sv.fieldData&&Object.keys(sv.fieldData).length){
    var keys=Object.keys(sv.fieldData);
    var filled=[];
    for(var ki=0;ki<keys.length;ki++){
      var v=sv.fieldData[keys[ki]];
      if(v&&String(v).trim()) filled.push({k:keys[ki],v:v});
    }
    if(filled.length){
      html+='<table class="field-table">';
      for(var fi=0;fi<filled.length;fi++){
        var lbl=filled[fi].k.replace(/^(we-|fsc-|inp_|sel_|cb_|radio_)/,'').replace(/-/g,' ');
        var val=String(filled[fi].v)==='checked'?'\u2713':esc(filled[fi].v);
        html+='<tr><td>'+esc(lbl)+'</td><td>'+val+'</td></tr>';
      }
      html+='</table>';
    }
  }
  html+='</div>';
  return html;
}
function openLb(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').className='lightbox open';
}
function renderReport(wk, rows){
  /* group by form */
  var byForm={};
  for(var i=0;i<rows.length;i++){
    var r=normaliseRow(rows[i]);
    if(!byForm[r.formId]) byForm[r.formId]=[];
    byForm[r.formId].push(r);
  }
  /* sort each form's saves oldest first */
  var fkeys=Object.keys(byForm);
  for(var fi=0;fi<fkeys.length;fi++){
    byForm[fkeys[fi]].sort(function(a,b){return a.savedAt<b.savedAt?-1:1;});
  }
  var totalForms=ALL_FORMS.length;
  var completedForms=Object.keys(byForm).length;
  var totalSaves=rows.length;
  var pct=Math.round(completedForms/totalForms*100);
  /* report header */
  var html='<div class="report">';
  html+='<div class="report-header">';
  html+='<div class="store">Moriarty Group SuperValu &middot; Store 424</div>';
  html+='<h2>&#128203; HACCP Weekly Report</h2>';
  html+='<div class="meta">Week of '+esc(weekLabel(wk))+'</div>';
  html+='<div class="stats">';
  html+='<div class="stat-box"><div class="val">'+completedForms+'<span style="font-size:14px;color:#666;">/'+totalForms+'</span></div><div class="lbl">Forms Completed</div></div>';
  html+='<div class="stat-box"><div class="val">'+pct+'%</div><div class="lbl">Compliance</div></div>';
  html+='<div class="stat-box"><div class="val">'+totalSaves+'</div><div class="lbl">Total Saves</div></div>';
  html+='</div></div>';
  /* categories */
  var cats=[],catMap={};
  for(var cf=0;cf<ALL_FORMS.length;cf++){
    var f=ALL_FORMS[cf];
    if(!catMap[f.cat]){catMap[f.cat]=[];cats.push(f.cat);}
    catMap[f.cat].push(f);
  }
  for(var ci=0;ci<cats.length;ci++){
    var cat=cats[ci],forms=catMap[cat];
    var catDone=0;
    for(var cfi=0;cfi<forms.length;cfi++){if(byForm[forms[cfi].id])catDone++;}
    var catPct=Math.round(catDone/forms.length*100);
    html+='<div class="cat-block">';
    html+='<div class="cat-header"><span>'+esc(cat)+'</span><span class="cat-pct">'+catDone+'/'+forms.length+' &middot; '+catPct+'%</span></div>';
    html+='<div class="form-block">';
    for(var ri=0;ri<forms.length;ri++){
      var form=forms[ri];
      var saves=byForm[form.id]||[];
      if(saves.length){
        html+='<div class="form-entry">';

/* Build merged field data from all saves */
function buildMergedFd(saves) {
var fd={};
for(var i=0;i<saves.length;i++){
if(saves[i].fieldData){
var keys=Object.keys(saves[i].fieldData);
for(var ki=0;ki<keys.length;ki++){
if(saves[i].fieldData[keys[ki]]) fd[keys[ki]]=saves[i].fieldData[keys[ki]];
}
}
}
return fd;
}

/* Try IndexedDB immediately, also try Supabase - whichever responds first with data wins */
var reportRendered=false;
function tryRenderFromIndexedDB(wk) {
try {
var DB_NAME=‘MoriartyHACCP’, DB_VER=2;
var req=indexedDB.open(DB_NAME,DB_VER);
req.onsuccess=function(e){
var db=e.target.result;
var stores=[];
try{var sn=db.objectStoreNames;for(var i=0;i<sn.length;i++)stores.push(sn[i]);}catch(ex){}
if(stores.indexOf(‘records’)===-1){
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ Local database has no records store. Records may only exist in Supabase.</div>’;
return;
}
var tx=db.transaction(‘records’,‘readonly’);
var r=tx.objectStore(‘records’).getAll();
r.onsuccess=function(ev){
if(reportRendered) return;
var all=ev.target.result||[];
var rows=[];
for(var i=0;i<all.length;i++){if(all[i].weekKey===wk)rows.push(all[i]);}
if(!rows.length){
/* show what weeks ARE available */
var availWks={};
for(var ai=0;ai<all.length;ai++) availWks[all[ai].weekKey]=1;
var wkList=Object.keys(availWks).sort().reverse();
var msg=‘No records found for week ‘+esc(wk)+’.’;
if(wkList.length) msg+=’ Available weeks: ‘+wkList.join(’, ‘);
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ ‘+msg+’<br><br><a href="records.html" style="color:#00703c;">← Back to Records</a></div>’;
return;
}
reportRendered=true;
renderReport(wk,rows);
};
r.onerror=function(e){
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ DB read error: ‘+(e.target.error||‘unknown’)+’</div>’;
};
};
req.onerror=function(e){
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ Cannot open DB: ‘+(e.target.error||‘unknown’)+’</div>’;
};
} catch(ex) {
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ Exception: ‘+esc(String(ex))+’</div>’;
}
}
function loadFromIndexedDB(wk) {
tryRenderFromIndexedDB(wk);
}
/* start IndexedDB load immediately */
tryRenderFromIndexedDB(weekKey);
/* also fetch from Supabase - 5 second timeout */
var fetchDone=false;
var fetchTimeout=setTimeout(function(){
if(!fetchDone){
fetchDone=true;
/* IndexedDB already tried - if still loading show message */
if(!reportRendered){
var cur=document.getElementById(‘content’).innerHTML;
if(cur.indexOf(‘Loading’)!==-1){
document.getElementById(‘content’).innerHTML=’<div class="error">⚠️ Could not load from cloud or local storage.<br><br>Make sure you close the week from index.html first, then open the report from the Records page Full Report button.<br><br><a href="records.html" style="color:#00703c;">← Back to Records</a></div>’;
}
}
}
},5000);
fetch(SB_URL+’/rest/v1/haccp_records?week_key=eq.’+weekKey+’&order=saved_at.asc’,{
headers:{‘apikey’:SB_KEY,‘Authorization’:’Bearer ’+SB_KEY}
}).then(function(r){return r.json();}).then(function(rows){
fetchDone=true;
clearTimeout(fetchTimeout);
if(reportRendered) return;
if(!rows||!rows.length||rows.error){
/* Supabase empty - IndexedDB already running */
return;
}
reportRendered=true;
renderReport(weekKey,rows);
}).catch(function(){
fetchDone=true;
clearTimeout(fetchTimeout);
});
document.getElementById(‘lightbox’).addEventListener(‘click’,function(e){
if(e.target===this){this.className=‘lightbox’;document.getElementById(‘lbImg’).src=’’;}
});
